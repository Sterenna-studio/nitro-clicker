<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>LEMEGETON OBS</title>
  <style>
    html, body { margin:0;padding:0;width:320px;height:190px;background:transparent;overflow:hidden; }
    body { display:grid;place-items:center; }
    .obs-frame { position:relative;overflow:hidden; }
    .obs-frame::before { content:'';position:absolute;inset:-8px;pointer-events:none;z-index:4;border-radius:inherit; }
    .vignette { position:absolute;inset:0;pointer-events:none;z-index:3;background:radial-gradient(ellipse 82% 74% at 50% 50%,transparent 42%,rgba(0,0,0,.28) 100%); }
    .scanlines { position:absolute;inset:0;pointer-events:none;z-index:2;background:repeating-linear-gradient(0deg,rgba(0,255,204,.045) 0 1px,transparent 1px 4px);opacity:0; }
    .has-scanlines .scanlines { opacity:0.7; }
    .crt-glare { position:absolute;inset:0;pointer-events:none;z-index:5;border-radius:inherit;opacity:0; }
    .has-glare .crt-glare { opacity:1;background:radial-gradient(ellipse 55% 35% at 34% 22%,rgba(255,255,255,.08) 0%,transparent 70%); }
    .crt-tv .scanlines { background:repeating-linear-gradient(0deg,rgba(0,0,0,.55) 0 1px,transparent 1px 3px) !important;opacity:1 !important; }
    .crt-tv .crt-glare { opacity:1 !important;background:radial-gradient(ellipse 70% 50% at 28% 18%,rgba(255,255,255,.13) 0%,transparent 60%) !important; }
    .crt-tv .vignette { background:radial-gradient(ellipse 75% 68% at 50% 50%,transparent 30%,rgba(0,0,0,.55) 100%) !important; }
    .has-bg { background:#000 !important; }
    .has-bg-phosphor { background:#001200 !important; }
    .has-bg-amber { background:#0d0800 !important; }
    .ice-overlay { position:absolute;inset:0;pointer-events:none;z-index:6;border-radius:inherit;opacity:0; }
    .has-ice .ice-overlay { opacity:1;background:radial-gradient(ellipse 60% 40% at 30% 25%,rgba(180,240,255,.14) 0%,transparent 65%),radial-gradient(ellipse 40% 60% at 70% 70%,rgba(140,210,255,.09) 0%,transparent 60%); }
    .bump-vignette { position:absolute;inset:0;pointer-events:none;z-index:4;border-radius:inherit;opacity:0; }
    .has-bump .bump-vignette { opacity:1;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 52%,rgba(0,0,0,.42) 100%); }
    .has-bump-strong .bump-vignette { opacity:1;background:radial-gradient(ellipse 70% 70% at 50% 50%,transparent 40%,rgba(0,0,0,.65) 100%); }
    .eye-container { position:relative; }
    .eye-container .eye {
      background:radial-gradient(circle at 50% 42%,var(--c1,#d6fff5) 0%,var(--c2,#00ffcc) 42%,var(--c3,#00b3ff) 92%) !important;
      box-shadow:0 0 20px var(--glow,rgba(0,255,204,.85)),0 0 44px rgba(0,180,255,.5) !important;
    }
    .mono-eye .eye:last-child { display:none !important; }
    .mono-eye { display:flex !important; align-items:center !important; justify-content:center !important; }
    .mono-eye .eye:first-child { width:10% !important; height:10% !important; flex-shrink:0 !important; }
  </style>
  <svg width="0" height="0" style="position:absolute;pointer-events:none">
    <defs>
      <filter id="bulge-soft" x="-5%" y="-5%" width="110%" height="110%"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="1" seed="2" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="2.5" xChannelSelector="R" yChannelSelector="G"/></filter>
      <filter id="bulge-mid"  x="-8%" y="-8%" width="116%" height="116%"><feTurbulence type="fractalNoise" baseFrequency="0.6"  numOctaves="1" seed="5" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="5"   xChannelSelector="R" yChannelSelector="G"/></filter>
      <filter id="bulge-hard" x="-12%" y="-12%" width="124%" height="124%"><feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="1" seed="9" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="9"   xChannelSelector="R" yChannelSelector="G"/></filter>
      <filter id="persp-3d"   x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur in="SourceAlpha" stdDeviation="2" result="shadow"/><feOffset in="shadow" dx="3" dy="3" result="offsetShadow"/><feFlood flood-color="rgba(0,0,0,0.5)" result="shadowColor"/><feComposite in="shadowColor" in2="offsetShadow" operator="in" result="dropShadow"/><feMerge><feMergeNode in="dropShadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="ice-filter"  x="-5%" y="-5%" width="110%" height="110%"><feTurbulence type="fractalNoise" baseFrequency="0.9 0.5" numOctaves="3" seed="12" result="n"/><feColorMatrix type="saturate" values="0" in="n" result="gray"/><feBlend in="SourceGraphic" in2="gray" mode="screen" result="blend"/><feDisplacementMap in="blend" in2="n" scale="1.8" xChannelSelector="R" yChannelSelector="B"/></filter>
    </defs>
  </svg>
</head>
<body>
  <div class="obs-frame" id="frame">
    <div class="crt-inner" id="crt-inner">
      <div class="eye-container" id="eye"></div>
      <div class="scanlines"></div>
      <div class="vignette"></div>
      <div class="bump-vignette"></div>
    </div>
    <div class="crt-glare"></div>
    <div class="ice-overlay"></div>
  </div>
  <script src="./js/vendor/web-eye-animation.js"></script>
  <link rel="stylesheet" href="./css/eye-override.css">
  <script>
  const COLOR_PRESETS={
    default:{c1:'#d6fff5',c2:'#00ffcc',c3:'#00b3ff',glow:'#00ccff',border:'#00b3ff'},
    red:{c1:'#fff0f0',c2:'#ff3333',c3:'#cc0000',glow:'#ff2200',border:'#ff2200'},
    green:{c1:'#f0fff4',c2:'#00ff88',c3:'#00cc44',glow:'#00ff66',border:'#00cc44'},
    yellow:{c1:'#fffef0',c2:'#ffe600',c3:'#cc9900',glow:'#ffcc00',border:'#ddaa00'},
    nitro:{c1:'#e8f0ff',c2:'#7744ff',c3:'#3300cc',glow:'#6633ff',border:'#5522ee'},
    red_hot:{c1:'#fff5e0',c2:'#ff8800',c3:'#ff2200',glow:'#ff5500',border:'#ff4400'},
    ice:{c1:'#ffffff',c2:'#aaddff',c3:'#3399ff',glow:'#88ccff',border:'#55aaff'},
    pink:{c1:'#fff0f8',c2:'#ff66cc',c3:'#cc0077',glow:'#ff44aa',border:'#ee33aa'},
    gold:{c1:'#fffbe8',c2:'#ffd700',c3:'#b8860b',glow:'#ffcc00',border:'#d4aa00'},
    void_:{c1:'#f0e8ff',c2:'#aa00ff',c3:'#440066',glow:'#9900ff',border:'#7700cc'},
    phosphor:{c1:'#efffef',c2:'#00ff44',c3:'#007722',glow:'#00ff44',border:'#00cc33'},
    amber:{c1:'#fff8e0',c2:'#ffaa00',c3:'#994400',glow:'#ff8800',border:'#cc6600'},
  };
  const FRAME_CONFIGS={none:{w:320,h:190,radius:'0'},oval:{w:308,h:178,radius:'48% / 38%'},square:{w:182,h:182,radius:'8px'},round:{w:178,h:178,radius:'50%'},mono:{w:178,h:178,radius:'50%',mono:true}};
  const BUMP_FILTERS={none:null,soft:'bulge-soft',mid:'bulge-mid',hard:'bulge-hard','3d':'persp-3d'};
  const P=new URLSearchParams(location.search);
  const colorKey=P.get('preset')||'default';
  const frameKey=P.get('frame')||'oval';
  const shaderRaw=P.get('shader')||'crt';
  const bumpKey=P.get('bump')||'soft';
  const bgMode=P.get('bg')||'transparent';
  const colorBase=COLOR_PRESETS[colorKey]||COLOR_PRESETS.default;
  const c1=P.get('c1')||colorBase.c1,c2=P.get('c2')||colorBase.c2,c3=P.get('c3')||colorBase.c3;
  const glow=P.get('glow')||colorBase.glow,border=P.get('border')||colorBase.border;
  const frameConf=FRAME_CONFIGS[frameKey]||FRAME_CONFIGS.oval;
  const bumpFilter=BUMP_FILTERS[bumpKey]??BUMP_FILTERS.soft;
  const hasShaderCRT=shaderRaw.includes('crt');
  const hasShaderIce=shaderRaw.includes('ice');
  const hasCRTTV=shaderRaw.includes('tv');
  const frameEl=document.getElementById('frame');
  const crtInner=document.getElementById('crt-inner');
  const eyeEl=document.getElementById('eye');
  frameEl.style.width=frameConf.w+'px'; frameEl.style.height=frameConf.h+'px';
  frameEl.style.borderRadius=frameConf.radius;
  eyeEl.style.width=frameConf.w+'px'; eyeEl.style.height=frameConf.h+'px';
  crtInner.style.width=frameConf.w+'px'; crtInner.style.height=frameConf.h+'px';
  if(bgMode==='black')    frameEl.classList.add('has-bg');
  if(bgMode==='phosphor') frameEl.classList.add('has-bg-phosphor');
  if(bgMode==='amber')    frameEl.classList.add('has-bg-amber');
  if(frameKey!=='none') frameEl.style.boxShadow=[`0 0 0 2px ${border}`,`0 0 10px 4px ${border}cc`,`0 0 28px 7px ${border}77`,`0 0 60px 14px ${border}33`,`inset 0 0 18px 4px ${border}22`].join(',');
  if(bumpFilter){ crtInner.style.filter=`url(#${bumpFilter})`; frameEl.classList.add(bumpKey==='hard'?'has-bump-strong':'has-bump'); }
  if(hasCRTTV) { frameEl.classList.add('crt-tv','has-scanlines','has-glare'); }
  else if(hasShaderCRT) frameEl.classList.add('has-scanlines','has-glare');
  if(hasShaderIce){ frameEl.classList.add('has-ice'); if(bumpFilter) crtInner.style.filter+=` url(#ice-filter)`; }
  if(frameConf.mono) eyeEl.classList.add('mono-eye');
  eyeEl.style.setProperty('--c1',c1); eyeEl.style.setProperty('--c2',c2); eyeEl.style.setProperty('--c3',c3);
  const hx=glow.replace('#','');
  eyeEl.style.setProperty('--glow',`rgba(${parseInt(hx.slice(0,2),16)},${parseInt(hx.slice(2,4),16)},${parseInt(hx.slice(4,6),16)},.85)`);

  const MARGIN = 28;
  const FW = frameConf.w, FH = frameConf.h;
  const CX = 160, CY = 95;
  const MAX_DX = FW/2 - MARGIN;
  const MAX_DY = FH/2 - MARGIN;
  function clampGaze(gx, gy) {
    const adx = Math.abs(gx), ady = Math.abs(gy);
    let nx = gx, ny = gy;
    if(adx > MAX_DX) nx = Math.sign(gx) * (MAX_DX - (adx - MAX_DX) * 0.1);
    if(ady > MAX_DY) ny = Math.sign(gy) * (MAX_DY - (ady - MAX_DY) * 0.1);
    nx = Math.max(-MAX_DX, Math.min(MAX_DX, nx));
    ny = Math.max(-MAX_DY, Math.min(MAX_DY, ny));
    return [nx, ny];
  }
  function safeMove(gx, gy) {
    const [nx, ny] = clampGaze(gx, gy);
    if(window.eyes?.move) window.eyes.move(CX + nx, CY + ny);
  }

  const EMOTIONS=['joy','sadness','surprise','anger','fear','disgust','confusion','love','sleepy','excitement'];
  const EMO_W=[12,3,8,2,2,1,6,7,4,9];
  let lastEmo=null;
  function pickEmo(){ const pool=[]; EMOTIONS.forEach((e,i)=>{ if(e!==lastEmo) for(let j=0;j<EMO_W[i];j++) pool.push(e); }); lastEmo=pool[Math.floor(Math.random()*pool.length)]; return lastEmo; }
  function sn(t,s){ const v=Math.sin(t*1.234+s*7.89)*43758.5453; return (v-Math.floor(v))*2-1; }
  function jitter(b,r){ return b*(1+(Math.random()-.5)*r); }
  const state={seed:Math.random()*1000,t:0,gx:0,gy:0,modeTimer:null,emotionTimer:null};

  function startMicro(){
    function tick(){
      state.t+=0.015+Math.random()*0.01;
      safeMove(state.gx+sn(state.t,state.seed)*7, state.gy+sn(state.t,state.seed+100)*4);
      setTimeout(tick,60+Math.random()*60);
    }
    tick();
  }
  function setGaze(x,y){ const [cx,cy]=clampGaze(x,y); state.gx=cx; state.gy=cy; }
  function modeIdle(){ setGaze((Math.random()-.5)*100,(Math.random()-.5)*60); if(window.eyes?.target) window.eyes.target(Math.round(state.gx*2.2),Math.round(state.gy*1.8),1000+Math.round(Math.random()*600)); scheduleNextMode(jitter(4500,.7)); }
  function modeFocus(){
    setGaze((Math.random()-.5)*160,(Math.random()-.5)*100);
    if(window.eyes?.target) window.eyes.target(Math.round(state.gx*2),Math.round(state.gy*1.5),600+Math.round(Math.random()*400));
    if(Math.random()>.55) setTimeout(()=>{ setGaze(state.gx+(Math.random()-.5)*30, state.gy+(Math.random()-.5)*20); },700+Math.random()*400);
    scheduleNextMode(jitter(3000,.8));
  }
  function modeDrift(){
    let steps=3+Math.floor(Math.random()*3),s=0;
    function step(){ if(s++>=steps){ scheduleNextMode(jitter(2000,.6)); return; } setGaze((Math.random()-.5)*140,(Math.random()*.4-.2)*70); if(window.eyes?.target) window.eyes.target(Math.round(state.gx*2),Math.round(state.gy*1.5),1200+Math.round(Math.random()*800)); setTimeout(step,jitter(900,.6)); }
    step();
  }
  function modeBlinkScan(){
    setGaze((Math.random()-.5)*160,(Math.random()-.5)*100);
    if(window.eyes?.target) window.eyes.target(Math.round(state.gx*2),Math.round(state.gy*1.5),700);
    setTimeout(()=>{
      if(window.eyes?.emotion) window.eyes.emotion('sleepy');
      setTimeout(()=>{ setGaze((Math.random()-.5)*160,(Math.random()-.5)*100); if(window.eyes?.target) window.eyes.target(Math.round(state.gx*2),Math.round(state.gy*1.5),700); if(window.eyes?.emotion) window.eyes.emotion(pickEmo()); scheduleNextMode(jitter(3500,.7)); },300+Math.random()*200);
    },600+Math.random()*400);
  }
  const MODES=[{fn:modeIdle,w:4},{fn:modeFocus,w:3},{fn:modeDrift,w:2},{fn:modeBlinkScan,w:2}];
  function pickMode(){ const pool=[]; MODES.forEach(m=>{ for(let i=0;i<m.w;i++) pool.push(m.fn); }); return pool[Math.floor(Math.random()*pool.length)]; }
  function scheduleNextMode(d){ clearTimeout(state.modeTimer); state.modeTimer=setTimeout(()=>pickMode()(),d); }
  function scheduleEmotion(){ state.emotionTimer=setTimeout(()=>{ if(window.eyes?.emotion) window.eyes.emotion(pickEmo()); scheduleEmotion(); },jitter(7000,.8)); }
  function scheduleSaccade(){
    setTimeout(()=>{
      if(window.eyes?.move){ const sx=(Math.random()-.5)*40,sy=(Math.random()-.5)*25; safeMove(state.gx+sx,state.gy+sy); setTimeout(()=>safeMove(state.gx,state.gy),80+Math.random()*60); }
      scheduleSaccade();
    },jitter(3200,.9));
  }
  function boot(){
    if(!window.eyes?.emotion){ requestAnimationFrame(boot); return; }
    window.eyes.emotion('joy');
    setTimeout(()=>{ startMicro(); scheduleEmotion(); scheduleSaccade(); setTimeout(()=>pickMode()(),jitter(1500,.5)); },Math.random()*4000);
  }
  boot();
  </script>
</body>
</html>
