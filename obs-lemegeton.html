<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEMEGETON OBS</title>
  <style>
    :root {
      --c1: #d6fff5;
      --c2: #00ffcc;
      --c3: #00b3ff;
      --glow: rgba(0,255,204,.85);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 320px;
      height: 190px;
      background: transparent;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
    }

    .obs-stage {
      position: relative;
      width: 320px;
      height: 190px;
      background: transparent;
      overflow: hidden;
    }

    .eye-container {
      width: 320px;
      height: 190px;
      position: relative;
    }

    .eye-container .eye {
      background: radial-gradient(circle at 50% 42%,
        var(--c1) 0%,
        var(--c2) 42%,
        var(--c3) 92%) !important;
      box-shadow:
        0 0 20px var(--glow),
        0 0 44px rgba(0,180,255,.5) !important;
    }

    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,255,204,.045) 0 1px,
        transparent 1px 4px
      );
      opacity: 0.7;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, transparent 45%, rgba(0,0,0,.18) 100%);
    }
  </style>
</head>
<body>
  <div class="obs-stage">
    <div class="eye-container" id="eye"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
  </div>

  <script src="./js/vendor/web-eye-animation.js"></script>
  <script>
    const EMOTIONS = ['joy', 'surprise', 'confusion', 'love', 'sleepy', 'excitement'];
    let emoIndex = 0;

    function setRandomTarget() {
      if (!window.eyes?.target) return;
      const x = Math.round((Math.random() * 2 - 1) * 260);
      const y = Math.round((Math.random() * 2 - 1) * 180);
      const z = 1000 + Math.round(Math.random() * 500);
      window.eyes.target(x, y, z);
    }

    function cycleEmotion() {
      if (!window.eyes?.emotion) return;
      window.eyes.emotion(EMOTIONS[emoIndex % EMOTIONS.length]);
      emoIndex++;
    }

    function boot() {
      if (!window.eyes?.emotion) {
        requestAnimationFrame(boot);
        return;
      }

      window.eyes.emotion('joy');
      setRandomTarget();

      setInterval(() => {
        cycleEmotion();
      }, 6000);

      setInterval(() => {
        setRandomTarget();
      }, 2200);
    }

    boot();
  </script>
</body>
</html>
