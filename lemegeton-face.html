<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEMEGETON · Visage parlant</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#00ffcc;--text:#cfe6f2;--muted:rgba(160,200,225,.55);--border:rgba(0,255,204,.18);--surface:#0c1218;--mono:'Share Tech Mono',monospace;--display:'Exo 2',sans-serif}
    html,body{min-height:100vh;background:radial-gradient(circle at 50% -10%,#0a1622,#06090e 60%);color:var(--text);font-family:var(--mono)}
    header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border)}
    header h1{font-family:var(--display);font-size:15px;letter-spacing:.16em;color:var(--primary)}
    header small{font-size:9px;letter-spacing:.2em;color:var(--muted);display:block}
    .top-actions a{color:var(--text);text-decoration:none;font-size:10px;letter-spacing:.14em;border:1px solid var(--border);padding:7px 12px;border-radius:8px;margin-left:6px}
    .top-actions a:hover{border-color:var(--primary);color:var(--primary)}
    main{display:grid;grid-template-columns:1fr 300px;gap:16px;padding:16px;max-width:1200px;margin:0 auto}
    @media(max-width:820px){main{grid-template-columns:1fr}}
    .stage{position:relative;min-height:60vh;border-radius:16px;overflow:hidden;border:1px solid rgba(0,255,204,.3);background:radial-gradient(circle at 50% 40%,rgba(0,255,204,.06),transparent 60%),#02060b;box-shadow:inset 0 0 60px rgba(0,255,204,.08)}
    canvas{display:block;width:100%;height:100%;cursor:crosshair}
    .controls{display:flex;flex-direction:column;gap:14px}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
    .panel h2{font-family:var(--display);font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
    textarea{width:100%;min-height:56px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:11px;padding:8px;resize:vertical}
    select{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:10px;padding:6px;margin-top:8px}
    .row{display:flex;align-items:center;gap:8px;margin:8px 0}
    .row label{flex:0 0 70px;font-size:9px;color:var(--muted)}
    .row input[type=range]{flex:1;accent-color:var(--primary)}
    .row input[type=color]{width:38px;height:26px;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer}
    .row .val{flex:0 0 34px;text-align:right;font-size:9px;color:var(--primary)}
    .reset{width:100%;padding:9px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:var(--mono);font-size:10px;letter-spacing:.14em;cursor:pointer}
    .reset.primary{border-color:var(--primary);color:var(--primary);background:rgba(0,255,204,.1)}
    .reset:hover{border-color:var(--primary);color:var(--primary)}
    .log{font-size:9px;color:var(--muted);margin-top:8px}
  </style>
</head>
<body>
  <header>
    <div><h1>⬡ LEMEGETON · VISAGE ROBOT</h1><small>SENTIENT EYE + BOUCHE SYNTHÉTIQUE · WEB SPEECH API</small></div>
    <nav class="top-actions"><a href="./lemegeton-compare.html">⇆ COMPARER</a><a href="./">▶ JOUER</a></nav>
  </header>
  <main>
    <section class="stage"><canvas id="cv"></canvas></section>
    <aside class="controls">
      <div class="panel">
        <h2>Parole</h2>
        <textarea id="text">Agent identifié. LEMEGETON est en ligne. Interface optique Sentient Eye synchronisée.</textarea>
        <select id="voice"></select>
        <div class="row"><label>Débit</label><input type="range" id="rate" min="0.6" max="1.4" step="0.05" value="1"><span class="val" id="rateVal">1.0</span></div>
        <button class="reset primary" id="speak" style="margin-top:6px">🗣 PARLER</button>
      </div>
      <div class="panel">
        <h2>Apparence</h2>
        <div class="row"><label>Yeux</label><input type="color" id="eyeColor" value="#66f7ff"></div>
        <div class="row"><label>Bouche</label><input type="color" id="mouthColor" value="#9ffcff"></div>
        <div class="row"><label>Écart</label><input type="range" id="gap" min="0.1" max="0.4" step="0.01" value="0.28"><span class="val" id="gapVal">.28</span></div>
        <button class="reset" id="robotPreset" style="margin-top:6px">🤖 PRESET ROBOT</button>
      </div>
      <div class="panel">
        <button class="reset" id="export" style="margin-bottom:8px;border-color:var(--primary);color:var(--primary)">📤 EXPORTER</button>
        <div class="log" id="log">Preset robot Sentient Eye prêt — tape un texte et « Parler »</div>
      </div>
    </aside>
  </main>
  <script>
    const $ = id => document.getElementById(id);
    const cv = $('cv'), ctx = cv.getContext('2d');
    const ROBOT_PRESET = {
      name: 'robot-sentient-face',
      eyeColor: '#66f7ff',
      mouthColor: '#9ffcff',
      gap: 0.28,
      tension: 0.78,
      brow: -0.22,
      lid: 0.12,
      glitch: 0.12,
    };
    const S = {
      lookX:0,
      lookY:0,
      tgtX:0,
      tgtY:0,
      blink:0,
      blinkTarget:0,
      mouth:0,
      speaking:false,
      gap:ROBOT_PRESET.gap,
      eyeColor:ROBOT_PRESET.eyeColor,
      mouthColor:ROBOT_PRESET.mouthColor,
      tension:ROBOT_PRESET.tension,
      brow:ROBOT_PRESET.brow,
      lid:ROBOT_PRESET.lid,
      glitch:ROBOT_PRESET.glitch,
    };
    let W=0,H=0,dpr=1,t=0;
    function resize(){ dpr=Math.min(2,window.devicePixelRatio||1); W=cv.clientWidth; H=cv.clientHeight; cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
    new ResizeObserver(resize).observe(cv); resize();

    function hexToRgb(hex){ return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) }; }
    function rgba(hex,alpha){ const c=hexToRgb(hex); return `rgba(${c.r},${c.g},${c.b},${alpha})`; }
    function rr(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
    function eyeShape(x,y,w,h,side){
      const tilt = S.brow * side * h * 0.18;
      const lid = S.lid * h;
      ctx.beginPath();
      ctx.moveTo(x-w/2,y);
      ctx.bezierCurveTo(x-w*.42,y-h*.56+tilt+lid,x+w*.42,y-h*.56-tilt+lid,x+w/2,y);
      ctx.bezierCurveTo(x+w*.38,y+h*.42,x-w*.38,y+h*.42,x-w/2,y);
      ctx.closePath();
    }
    function drawBackplate(cx,cy,w,h){
      ctx.save();
      ctx.shadowColor=S.eyeColor; ctx.shadowBlur=26;
      ctx.strokeStyle=rgba(S.eyeColor,.28); ctx.lineWidth=1.4;
      rr(cx-w/2,cy-h/2,w,h,h*.18); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(255,255,255,.055)';
      for(let i=0;i<8;i++){
        const x=cx-w*.44+i*w*.125;
        ctx.beginPath(); ctx.moveTo(x,cy-h*.42); ctx.lineTo(x+Math.sin(t+i)*7,cy+h*.42); ctx.stroke();
      }
      ctx.restore();
    }
    function drawFaceShell(cx,cy,w,h){
      ctx.save();
      ctx.shadowColor=S.eyeColor; ctx.shadowBlur=18;
      ctx.fillStyle='rgba(3,11,18,.62)';
      ctx.strokeStyle=rgba(S.eyeColor,.24);
      ctx.lineWidth=1.6;
      ctx.beginPath();
      ctx.moveTo(cx-w*.28,cy-h*.48);
      ctx.lineTo(cx+w*.28,cy-h*.48);
      ctx.lineTo(cx+w*.42,cy-h*.26);
      ctx.lineTo(cx+w*.34,cy+h*.34);
      ctx.lineTo(cx+w*.17,cy+h*.52);
      ctx.lineTo(cx-w*.17,cy+h*.52);
      ctx.lineTo(cx-w*.34,cy+h*.34);
      ctx.lineTo(cx-w*.42,cy-h*.26);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(255,255,255,.055)';
      ctx.beginPath();
      ctx.moveTo(cx,cy-h*.42); ctx.lineTo(cx,cy+h*.44);
      ctx.moveTo(cx-w*.34,cy-h*.18); ctx.lineTo(cx-w*.48,cy-h*.02);
      ctx.moveTo(cx+w*.34,cy-h*.18); ctx.lineTo(cx+w*.48,cy-h*.02);
      ctx.moveTo(cx-w*.24,cy+h*.38); ctx.lineTo(cx+w*.24,cy+h*.38);
      ctx.stroke();
      ctx.fillStyle=rgba(S.eyeColor,.7);
      [-1,1].forEach(side=>{
        ctx.beginPath(); ctx.arc(cx+side*w*.35,cy-h*.26,w*.018,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+side*w*.28,cy+h*.32,w*.014,0,Math.PI*2); ctx.fill();
      });
      ctx.restore();
    }
    function drawSentientEye(x,y,w,h,side){
      const glitch = Math.random()<S.glitch*.025 ? (Math.random()*2-1)*S.glitch*18 : 0;
      const ex=x+glitch, ey=y+Math.sin(t*2+side)*1.8;
      ctx.save();
      eyeShape(ex,ey,w,h,side); ctx.clip();
      const g=ctx.createRadialGradient(ex-w*.1,ey-h*.18,2,ex,ey,w*.72);
      g.addColorStop(0,'#efffff'); g.addColorStop(.38,S.eyeColor); g.addColorStop(1,'#0b5c7d');
      ctx.shadowColor=S.eyeColor; ctx.shadowBlur=24; ctx.fillStyle=g;
      eyeShape(ex,ey,w,h,side); ctx.fill();
      const px=ex+S.lookX*w*.18, py=ey+S.lookY*h*.18;
      ctx.shadowBlur=0; ctx.fillStyle='#020913';
      ctx.beginPath(); ctx.ellipse(px,py,w*.12,h*.25,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=rgba(S.eyeColor,.74);
      ctx.beginPath(); ctx.ellipse(px-w*.035,py-h*.07,w*.022,h*.05,0,0,Math.PI*2); ctx.fill();
      if(S.blink>0.02){ ctx.fillStyle='#02060b'; ctx.fillRect(ex-w*.62,ey-h*.62,w*1.24,h*1.24*S.blink); }
      ctx.restore();

      ctx.save();
      ctx.strokeStyle=rgba(S.eyeColor,.82); ctx.lineWidth=2;
      ctx.shadowColor=S.eyeColor; ctx.shadowBlur=14;
      eyeShape(ex,ey,w,h,side); ctx.stroke();
      ctx.lineWidth=4; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(ex-w*.52,ey-h*.58-S.tension*h*.16);
      ctx.quadraticCurveTo(ex,ey-h*.82-S.tension*h*.1,ex+w*.52,ey-h*.58+S.brow*side*h*.22);
      ctx.stroke();
      ctx.restore();
    }
    function drawRobotMouth(cx,cy,w){
      const open=S.mouth;
      const h=w*(.08+open*.2);
      ctx.save();
      ctx.shadowColor=S.mouthColor; ctx.shadowBlur=20;
      ctx.strokeStyle=rgba(S.mouthColor,.86); ctx.lineWidth=2;
      ctx.fillStyle='rgba(2,6,11,.72)';
      rr(cx-w/2,cy-h/2,w,h,h*.22); ctx.fill(); ctx.stroke();
      const slots=7;
      for(let i=0;i<slots;i++){
        const x=cx-w*.38+i*(w*.76/(slots-1));
        const slotH=h*(.32+open*.45)*(i%2?0.8:1);
        ctx.beginPath(); ctx.moveTo(x,cy-slotH/2); ctx.lineTo(x,cy+slotH/2); ctx.stroke();
      }
      ctx.restore();
    }
    function applyRobotPreset(){
      Object.assign(S, {
        gap: ROBOT_PRESET.gap,
        eyeColor: ROBOT_PRESET.eyeColor,
        mouthColor: ROBOT_PRESET.mouthColor,
        tension: ROBOT_PRESET.tension,
        brow: ROBOT_PRESET.brow,
        lid: ROBOT_PRESET.lid,
        glitch: ROBOT_PRESET.glitch,
      });
      $('gap').value=String(S.gap); $('gapVal').textContent=S.gap.toFixed(2);
      $('eyeColor').value=S.eyeColor; $('mouthColor').value=S.mouthColor;
      $('log').textContent='Preset robot Sentient Eye appliqué';
    }

    function frame(){
      t+=0.016;
      S.lookX+=(S.tgtX-S.lookX)*0.15; S.lookY+=(S.tgtY-S.lookY)*0.15;
      S.blink+=(S.blinkTarget-S.blink)*0.4; if(S.blink>0.9) S.blinkTarget=0;
      // bouche : oscille pendant la parole, sinon se ferme
      const target = S.speaking ? Math.max(0, (0.5+0.5*Math.sin(t*16)) * (0.55+0.45*Math.sin(t*7.3+1))) : 0;
      S.mouth += (target - S.mouth)*0.35;
      ctx.clearRect(0,0,W,H);
      const cx=W/2, eyeY=H*0.39;
      const eyeW=Math.min(W,H)*0.24, eyeH=eyeW*0.48;
      const gapPx=W*S.gap;
      const faceW=Math.min(W*.68,eyeW*3.35+gapPx);
      const faceH=Math.min(H*.74,eyeH*5.3);
      drawFaceShell(cx,H*.48,faceW,faceH);
      drawBackplate(cx,eyeY,Math.min(W*.76,eyeW*3.2+gapPx),eyeH*3.1);
      [-1,1].forEach(side=>{
        const ex=cx+side*(eyeW*.5+gapPx*.5);
        drawSentientEye(ex,eyeY,eyeW,eyeH,side);
      });
      drawRobotMouth(cx,H*.65,eyeW*1.35);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
    setInterval(()=>{ if(Math.random()<0.55) S.blinkTarget=1; }, 3400);
    setInterval(()=>{ if(S.speaking) return; S.tgtX=(Math.random()*2-1)*0.55; S.tgtY=(Math.random()*2-1)*0.38; setTimeout(()=>{S.tgtX=0;S.tgtY=0;},1300); }, 5200);

    // Voix
    const synth = window.speechSynthesis;
    function loadVoices(){ const vs=synth?synth.getVoices():[]; const sel=$('voice'); sel.innerHTML=''; const fr=vs.filter(v=>/fr/i.test(v.lang)); (fr.length?fr:vs).forEach((v,i)=>{ const o=document.createElement('option'); o.value=v.name; o.textContent=`${v.name} (${v.lang})`; sel.appendChild(o); }); }
    if(synth){ loadVoices(); synth.onvoiceschanged=loadVoices; } else { $('log').textContent='⚠️ Web Speech API indisponible sur ce navigateur'; }

    $('rate').oninput=()=>$('rateVal').textContent=(+$('rate').value).toFixed(2);
    $('gap').oninput=()=>{S.gap=+$('gap').value;$('gapVal').textContent=S.gap.toFixed(2);};
    $('eyeColor').oninput=()=>S.eyeColor=$('eyeColor').value;
    $('mouthColor').oninput=()=>S.mouthColor=$('mouthColor').value;
    $('robotPreset').onclick=applyRobotPreset;
    cv.addEventListener('click',e=>{ const r=cv.getBoundingClientRect(); S.tgtX=Math.max(-1,Math.min(1,((e.clientX-r.left)/W-.5)*2)); S.tgtY=Math.max(-1,Math.min(1,((e.clientY-r.top)/H-.42)*2)); });

    $('speak').onclick=()=>{
      if(!synth) return;
      synth.cancel();
      const u=new SpeechSynthesisUtterance($('text').value);
      u.rate=+$('rate').value;
      const vname=$('voice').value; const v=synth.getVoices().find(x=>x.name===vname); if(v){u.voice=v;u.lang=v.lang;}
      u.onstart=()=>{S.speaking=true;$('log').textContent='parle…';};
      u.onend=()=>{S.speaking=false;$('log').textContent='fini';};
      u.onerror=()=>{S.speaking=false;$('log').textContent='erreur parole';};
      synth.speak(u);
    };
    $('export').onclick=()=>{
      const p={variante:'Visage robot parlant (Sentient Eye + Web Speech)',preset:ROBOT_PRESET.name,ecart:S.gap,couleurYeux:S.eyeColor,couleurBouche:S.mouthColor,tension:S.tension,glitch:S.glitch,debit:+$('rate').value,exporte_le:new Date().toISOString()};
      const j=JSON.stringify(p,null,2); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([j],{type:'application/json'})); a.download='visage-params.json'; a.click(); URL.revokeObjectURL(a.href);
      navigator.clipboard?.writeText(j).catch(()=>{}); $('log').textContent='paramètres exportés';
    };
  </script>
</body>
</html>
