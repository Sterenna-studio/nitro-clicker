<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEMEGETON · Visage parlant</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#00ffcc;--text:#cfe6f2;--muted:rgba(160,200,225,.55);--border:rgba(0,255,204,.18);--surface:#0c1218;--mono:'Share Tech Mono',monospace;--display:'Exo 2',sans-serif}
    html,body{min-height:100vh;background:radial-gradient(circle at 50% -10%,#0a1622,#06090e 60%);color:var(--text);font-family:var(--mono)}
    header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border)}
    header h1{font-family:var(--display);font-size:15px;letter-spacing:.16em;color:var(--primary)}
    header small{font-size:9px;letter-spacing:.2em;color:var(--muted);display:block}
    .top-actions a{color:var(--text);text-decoration:none;font-size:10px;letter-spacing:.14em;border:1px solid var(--border);padding:7px 12px;border-radius:8px;margin-left:6px}
    .top-actions a:hover{border-color:var(--primary);color:var(--primary)}
    main{display:grid;grid-template-columns:1fr 300px;gap:16px;padding:16px;max-width:1200px;margin:0 auto}
    @media(max-width:820px){main{grid-template-columns:1fr}}
    .stage{position:relative;min-height:60vh;border-radius:16px;overflow:hidden;border:1px solid rgba(0,255,204,.3);background:radial-gradient(circle at 50% 40%,rgba(0,255,204,.06),transparent 60%),#02060b;box-shadow:inset 0 0 60px rgba(0,255,204,.08)}
    canvas{display:block;width:100%;height:100%;cursor:crosshair}
    .controls{display:flex;flex-direction:column;gap:14px}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
    .panel h2{font-family:var(--display);font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
    textarea{width:100%;min-height:56px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:11px;padding:8px;resize:vertical}
    select{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:10px;padding:6px;margin-top:8px}
    .row{display:flex;align-items:center;gap:8px;margin:8px 0}
    .row label{flex:0 0 70px;font-size:9px;color:var(--muted)}
    .row input[type=range]{flex:1;accent-color:var(--primary)}
    .row input[type=color]{width:38px;height:26px;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer}
    .row .val{flex:0 0 34px;text-align:right;font-size:9px;color:var(--primary)}
    .reset{width:100%;padding:9px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:var(--mono);font-size:10px;letter-spacing:.14em;cursor:pointer}
    .reset.primary{border-color:var(--primary);color:var(--primary);background:rgba(0,255,204,.1)}
    .reset:hover{border-color:var(--primary);color:var(--primary)}
    .log{font-size:9px;color:var(--muted);margin-top:8px}
  </style>
</head>
<body>
  <header>
    <div><h1>⬡ LEMEGETON · VISAGE PARLANT</h1><small>YEUX + BOUCHE · WEB SPEECH API · TEST</small></div>
    <nav class="top-actions"><a href="./lemegeton-compare.html">⇆ COMPARER</a><a href="./">▶ JOUER</a></nav>
  </header>
  <main>
    <section class="stage"><canvas id="cv"></canvas></section>
    <aside class="controls">
      <div class="panel">
        <h2>Parole</h2>
        <textarea id="text">Bonjour agent. LEMEGETON est en ligne. Le réseau Nitro est stable.</textarea>
        <select id="voice"></select>
        <div class="row"><label>Débit</label><input type="range" id="rate" min="0.6" max="1.4" step="0.05" value="1"><span class="val" id="rateVal">1.0</span></div>
        <button class="reset primary" id="speak" style="margin-top:6px">🗣 PARLER</button>
      </div>
      <div class="panel">
        <h2>Apparence</h2>
        <div class="row"><label>Yeux</label><input type="color" id="eyeColor" value="#00ffcc"></div>
        <div class="row"><label>Bouche</label><input type="color" id="mouthColor" value="#00ffcc"></div>
        <div class="row"><label>Écart</label><input type="range" id="gap" min="0.1" max="0.4" step="0.01" value="0.22"><span class="val" id="gapVal">.22</span></div>
      </div>
      <div class="panel">
        <button class="reset" id="export" style="margin-bottom:8px;border-color:var(--primary);color:var(--primary)">📤 EXPORTER</button>
        <div class="log" id="log">Visage prêt — tape un texte et « Parler »</div>
      </div>
    </aside>
  </main>
  <script>
    const $ = id => document.getElementById(id);
    const cv = $('cv'), ctx = cv.getContext('2d');
    const S = { lookX:0, lookY:0, tgtX:0, tgtY:0, blink:0, blinkTarget:0, mouth:0, speaking:false, gap:0.22, eyeColor:'#00ffcc', mouthColor:'#00ffcc' };
    let W=0,H=0,dpr=1,t=0;
    function resize(){ dpr=Math.min(2,window.devicePixelRatio||1); W=cv.clientWidth; H=cv.clientHeight; cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
    new ResizeObserver(resize).observe(cv); resize();

    function glowCircle(x,y,r,color){ const g=ctx.createRadialGradient(x,y-r*0.3,2,x,y,r); g.addColorStop(0,'#eafff9'); g.addColorStop(.55,color); g.addColorStop(1,'#0090c8'); ctx.save(); ctx.shadowColor=color; ctx.shadowBlur=26; ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.restore(); }
    function rr(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

    function frame(){
      t+=0.016;
      S.lookX+=(S.tgtX-S.lookX)*0.15; S.lookY+=(S.tgtY-S.lookY)*0.15;
      S.blink+=(S.blinkTarget-S.blink)*0.4; if(S.blink>0.9) S.blinkTarget=0;
      // bouche : oscille pendant la parole, sinon se ferme
      const target = S.speaking ? Math.max(0, (0.5+0.5*Math.sin(t*16)) * (0.55+0.45*Math.sin(t*7.3+1))) : 0;
      S.mouth += (target - S.mouth)*0.35;
      ctx.clearRect(0,0,W,H);
      const cx=W/2, eyeR=Math.min(W,H)*0.1, eyeY=H*0.4;
      const gapPx=W*S.gap;
      // yeux
      [-1,1].forEach(side=>{
        const ex=cx+side*(eyeR+gapPx*0.5), ey=eyeY;
        glowCircle(ex,ey,eyeR,S.eyeColor);
        // pupille (regard) + clignement (paupière du fond)
        ctx.fillStyle='#021016'; ctx.beginPath(); ctx.arc(ex+S.lookX*0.4, ey+S.lookY*0.4, eyeR*0.42, 0, Math.PI*2); ctx.fill();
        if(S.blink>0.02){ ctx.fillStyle='#02060b'; ctx.fillRect(ex-eyeR-3, ey-eyeR-3, (eyeR+3)*2, (eyeR+3)*2*S.blink); }
      });
      // bouche
      const mw=eyeR*2.4, mx=cx-mw/2, my=H*0.62, baseH=eyeR*0.22, mh=baseH + S.mouth*eyeR*1.1;
      ctx.save(); ctx.shadowColor=S.mouthColor; ctx.shadowBlur=22; ctx.fillStyle=S.mouthColor;
      rr(mx, my, mw, mh, mh*0.5); ctx.fill();
      // intérieur sombre quand ouvert
      if(S.mouth>0.08){ ctx.shadowBlur=0; ctx.fillStyle='#021016'; const ih=Math.max(0,mh-baseH*0.8); rr(mx+mw*0.08, my+(mh-ih)/2, mw*0.84, ih, ih*0.5); ctx.fill(); }
      ctx.restore();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
    setInterval(()=>{ if(Math.random()<0.55) S.blinkTarget=1; }, 3400);
    setInterval(()=>{ if(S.speaking) return; S.tgtX=(Math.random()*2-1)*W*0.05; S.tgtY=(Math.random()*2-1)*H*0.04; setTimeout(()=>{S.tgtX=0;S.tgtY=0;},1300); }, 5200);

    // Voix
    const synth = window.speechSynthesis;
    function loadVoices(){ const vs=synth?synth.getVoices():[]; const sel=$('voice'); sel.innerHTML=''; const fr=vs.filter(v=>/fr/i.test(v.lang)); (fr.length?fr:vs).forEach((v,i)=>{ const o=document.createElement('option'); o.value=v.name; o.textContent=`${v.name} (${v.lang})`; sel.appendChild(o); }); }
    if(synth){ loadVoices(); synth.onvoiceschanged=loadVoices; } else { $('log').textContent='⚠️ Web Speech API indisponible sur ce navigateur'; }

    $('rate').oninput=()=>$('rateVal').textContent=(+$('rate').value).toFixed(2);
    $('gap').oninput=()=>{S.gap=+$('gap').value;$('gapVal').textContent=S.gap.toFixed(2);};
    $('eyeColor').oninput=()=>S.eyeColor=$('eyeColor').value;
    $('mouthColor').oninput=()=>S.mouthColor=$('mouthColor').value;
    cv.addEventListener('click',e=>{ const r=cv.getBoundingClientRect(); S.tgtX=Math.max(-W*0.1,Math.min(W*0.1,(e.clientX-r.left-W/2)*0.4)); S.tgtY=Math.max(-H*0.08,Math.min(H*0.08,(e.clientY-r.top-H*0.4)*0.4)); });

    $('speak').onclick=()=>{
      if(!synth) return;
      synth.cancel();
      const u=new SpeechSynthesisUtterance($('text').value);
      u.rate=+$('rate').value;
      const vname=$('voice').value; const v=synth.getVoices().find(x=>x.name===vname); if(v){u.voice=v;u.lang=v.lang;}
      u.onstart=()=>{S.speaking=true;$('log').textContent='parle…';};
      u.onend=()=>{S.speaking=false;$('log').textContent='fini';};
      u.onerror=()=>{S.speaking=false;$('log').textContent='erreur parole';};
      synth.speak(u);
    };
    $('export').onclick=()=>{
      const p={variante:'Visage parlant (canvas + Web Speech)',ecart:S.gap,couleurYeux:S.eyeColor,couleurBouche:S.mouthColor,debit:+$('rate').value,exporte_le:new Date().toISOString()};
      const j=JSON.stringify(p,null,2); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([j],{type:'application/json'})); a.download='visage-params.json'; a.click(); URL.revokeObjectURL(a.href);
      navigator.clipboard?.writeText(j).catch(()=>{}); $('log').textContent='paramètres exportés';
    };
  </script>
</body>
</html>
