<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>LEMEGETON — Radio Reactif</title>
  <style>
    html,body{margin:0;padding:0;width:320px;height:190px;background:transparent;overflow:hidden;}
    body{display:grid;place-items:center;}
    .obs-frame{position:relative;overflow:hidden;transition:box-shadow .15s;}
    .crt-inner{width:100%;height:100%;position:relative;}
    .eye-container{position:relative;}
    .eye-container .eye{
      background:radial-gradient(circle at 50% 42%,var(--c1,#d6fff5) 0%,var(--c2,#00ffcc) 42%,var(--c3,#00b3ff) 92%) !important;
      box-shadow:0 0 20px var(--glow,rgba(0,255,204,.85)),0 0 44px rgba(0,180,255,.5) !important;
      transition:transform .08s ease-out;
    }
    .scanlines{position:absolute;inset:0;pointer-events:none;z-index:2;background:repeating-linear-gradient(0deg,rgba(0,255,204,.045) 0 1px,transparent 1px 4px);opacity:.7;}
    .vignette{position:absolute;inset:0;pointer-events:none;z-index:3;background:radial-gradient(ellipse 82% 74% at 50% 50%,transparent 42%,rgba(0,0,0,.28) 100%);}
    .bump-vignette{position:absolute;inset:0;pointer-events:none;z-index:4;border-radius:inherit;}
    .crt-glare{position:absolute;inset:0;pointer-events:none;z-index:5;border-radius:inherit;background:radial-gradient(ellipse 55% 35% at 34% 22%,rgba(255,255,255,.08) 0%,transparent 70%);}
    .crt-tv .scanlines{background:repeating-linear-gradient(0deg,rgba(0,0,0,.55) 0 1px,transparent 1px 3px) !important;opacity:1 !important;}
    .crt-tv .vignette{background:radial-gradient(ellipse 75% 68% at 50% 50%,transparent 30%,rgba(0,0,0,.55) 100%) !important;}
    .has-bg{background:#000 !important;} .has-bg-phosphor{background:#001200 !important;} .has-bg-amber{background:#0d0800 !important;}
    #audio-bar{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:flex-end;z-index:10;pointer-events:none;}
    #audio-bar span{width:4px;background:var(--c2,#00ffcc);border-radius:2px 2px 0 0;opacity:.7;transition:height .05s ease-out;}
    #now-playing{position:absolute;bottom:22px;left:0;right:0;text-align:center;font-family:'Courier New',monospace;font-size:8px;letter-spacing:.1em;color:var(--c2,#00ffcc);opacity:.55;z-index:10;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 12px;pointer-events:none;text-shadow:0 0 6px var(--c2,#00ffcc);}
    .beat-ring{position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:8;transition:box-shadow .06s ease-out;}
  </style>
  <svg width="0" height="0" style="position:absolute;pointer-events:none">
    <defs>
      <filter id="bulge-soft" x="-5%" y="-5%" width="110%" height="110%"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="1" seed="2" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="2.5" xChannelSelector="R" yChannelSelector="G"/></filter>
    </defs>
  </svg>
</head>
<body>
  <div class="obs-frame" id="frame">
    <div class="crt-inner" id="crt-inner">
      <div class="eye-container" id="eye"></div>
      <div class="scanlines"></div>
      <div class="vignette"></div>
      <div class="bump-vignette"></div>
    </div>
    <div class="crt-glare"></div>
    <div class="beat-ring" id="beat-ring"></div>
    <div id="now-playing"></div>
    <div id="audio-bar"></div>
  </div>
  <script src="./js/vendor/web-eye-animation.js"></script>
  <link rel="stylesheet" href="./css/eye-override.css">
  <script>
  const COLOR_PRESETS={
    default:{c1:'#d6fff5',c2:'#00ffcc',c3:'#00b3ff',glow:'#00ccff',border:'#00b3ff'},
    red:{c1:'#fff0f0',c2:'#ff3333',c3:'#cc0000',glow:'#ff2200',border:'#ff2200'},
    green:{c1:'#f0fff4',c2:'#00ff88',c3:'#00cc44',glow:'#00ff66',border:'#00cc44'},
    yellow:{c1:'#fffef0',c2:'#ffe600',c3:'#cc9900',glow:'#ffcc00',border:'#ddaa00'},
    nitro:{c1:'#e8f0ff',c2:'#7744ff',c3:'#3300cc',glow:'#6633ff',border:'#5522ee'},
    red_hot:{c1:'#fff5e0',c2:'#ff8800',c3:'#ff2200',glow:'#ff5500',border:'#ff4400'},
    ice:{c1:'#ffffff',c2:'#aaddff',c3:'#3399ff',glow:'#88ccff',border:'#55aaff'},
    pink:{c1:'#fff0f8',c2:'#ff66cc',c3:'#cc0077',glow:'#ff44aa',border:'#ee33aa'},
    gold:{c1:'#fffbe8',c2:'#ffd700',c3:'#b8860b',glow:'#ffcc00',border:'#d4aa00'},
    void_:{c1:'#f0e8ff',c2:'#aa00ff',c3:'#440066',glow:'#9900ff',border:'#7700cc'},
    phosphor:{c1:'#efffef',c2:'#00ff44',c3:'#007722',glow:'#00ff44',border:'#00cc33'},
    amber:{c1:'#fff8e0',c2:'#ffaa00',c3:'#994400',glow:'#ff8800',border:'#cc6600'},
  };
  const P=new URLSearchParams(location.search);
  const colorKey=P.get('preset')||'default';
  const frameKey=P.get('frame')||'oval';
  const bumpKey=P.get('bump')||'soft';
  const shaderRaw=P.get('shader')||'crt';
  const showBar=P.get('bar')!=='0';
  const showTitle=P.get('title')!=='0';
  const bgMode=P.get('bg')||'transparent';
  const RADIO_STATE_URL=P.get('radio')||'https://korigan.sterenna.fr/api/radio/state';
  const STREAM_URL=P.get('stream')||'https://korigan.sterenna.fr/radio/chronicles.mp3';
  const colorBase=COLOR_PRESETS[colorKey]||COLOR_PRESETS.default;
  const c1=P.get('c1')||colorBase.c1,c2=P.get('c2')||colorBase.c2,c3=P.get('c3')||colorBase.c3;
  const glow=P.get('glow')||colorBase.glow,border=P.get('border')||colorBase.border;
  const FRAME_CONFIGS={none:{w:320,h:190,radius:'0'},oval:{w:308,h:178,radius:'48% / 38%'},square:{w:182,h:182,radius:'8px'},round:{w:178,h:178,radius:'50%'}};
  const BUMP_FILTERS={none:null,soft:'bulge-soft',mid:'bulge-soft'};
  const frameConf=FRAME_CONFIGS[frameKey]||FRAME_CONFIGS.oval;
  const bumpFilter=BUMP_FILTERS[bumpKey]??BUMP_FILTERS.soft;
  const hasCRTTV=shaderRaw.includes('tv');
  const frameEl=document.getElementById('frame');
  const crtInner=document.getElementById('crt-inner');
  const eyeEl=document.getElementById('eye');
  frameEl.style.width=frameConf.w+'px'; frameEl.style.height=frameConf.h+'px';
  frameEl.style.borderRadius=frameConf.radius;
  eyeEl.style.width=frameConf.w+'px'; eyeEl.style.height=frameConf.h+'px';
  crtInner.style.width=frameConf.w+'px'; crtInner.style.height=frameConf.h+'px';
  if(bumpFilter) crtInner.style.filter=`url(#${bumpFilter})`;
  if(bgMode==='black')    { document.body.style.background='#000'; frameEl.classList.add('has-bg'); }
  if(bgMode==='phosphor') { document.body.style.background='#001200'; frameEl.classList.add('has-bg-phosphor'); }
  if(bgMode==='amber')    { document.body.style.background='#0d0800'; frameEl.classList.add('has-bg-amber'); }
  if(hasCRTTV) frameEl.classList.add('crt-tv');
  if(frameKey!=='none') frameEl.style.boxShadow=[`0 0 0 2px ${border}`,`0 0 10px 4px ${border}cc`,`0 0 28px 7px ${border}77`,`inset 0 0 18px 4px ${border}22`].join(',');
  eyeEl.style.setProperty('--c1',c1);eyeEl.style.setProperty('--c2',c2);eyeEl.style.setProperty('--c3',c3);
  const hx=glow.replace('#','');
  eyeEl.style.setProperty('--glow',`rgba(${parseInt(hx.slice(0,2),16)},${parseInt(hx.slice(2,4),16)},${parseInt(hx.slice(4,6),16)},.85)`);
  if(!showBar) document.getElementById('audio-bar').style.display='none';
  if(!showTitle) document.getElementById('now-playing').style.display='none';

  // Repousse bords
  const MARGIN=28;
  const FW=frameConf.w,FH=frameConf.h;
  const MAX_DX=FW/2-MARGIN,MAX_DY=FH/2-MARGIN;
  function clampGaze(gx,gy){
    let nx=gx,ny=gy;
    const adx=Math.abs(gx),ady=Math.abs(gy);
    if(adx>MAX_DX) nx=Math.sign(gx)*(MAX_DX-(adx-MAX_DX)*0.1);
    if(ady>MAX_DY) ny=Math.sign(gy)*(MAX_DY-(ady-MAX_DY)*0.1);
    nx=Math.max(-MAX_DX,Math.min(MAX_DX,nx));
    ny=Math.max(-MAX_DY,Math.min(MAX_DY,ny));
    return[nx,ny];
  }
  function safeMove(gx,gy){ const[nx,ny]=clampGaze(gx,gy); if(window.eyes?.move) window.eyes.move(160+nx,95+ny); }

  const barEl=document.getElementById('audio-bar');
  const bars=[];
  for(let i=0;i<8;i++){const b=document.createElement('span');b.style.height='2px';barEl.appendChild(b);bars.push(b);}

  let analyser=null,freqData=null,audioReady=false;
  let currentLevel=0,beatCooldown=0,smoothLevel=0;

  async function initAudio(){
    try{
      const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      const audio=new Audio();
      audio.crossOrigin='anonymous';
      audio.src=STREAM_URL;
      audio.volume=0;
      const source=audioCtx.createMediaElementSource(audio);
      analyser=audioCtx.createAnalyser();
      analyser.fftSize=64;
      analyser.smoothingTimeConstant=0.7;
      freqData=new Uint8Array(analyser.frequencyBinCount);
      source.connect(analyser);
      await audio.play();
      audioReady=true;
    }catch(e){ console.warn('[audio] fallback:',e.message); simulateFallback(); }
  }
  function simulateFallback(){ setInterval(()=>updateVisuals(0.05+Math.random()*0.1,false),80); }
  function getLevel(){ if(!analyser||!freqData) return 0; analyser.getByteFrequencyData(freqData); const end=Math.floor(freqData.length/4); let s=0; for(let i=0;i<end;i++) s+=freqData[i]; return s/(end*255); }
  function getSpectrum(){ if(!analyser||!freqData) return new Array(8).fill(0); analyser.getByteFrequencyData(freqData); const step=Math.floor(freqData.length/8); return Array.from({length:8},(_,i)=>freqData[i*step]/255); }

  const LEVEL_EMOTIONS=[{t:0.75,e:['surprise','excitement']},{t:0.5,e:['excitement','joy']},{t:0.2,e:['joy','love']},{t:0,e:['sleepy','confusion']}];
  let lastAudioEmo=null,audioEmoTimer=null;
  function pickAudioEmo(lv){ for(const x of LEVEL_EMOTIONS) if(lv>=x.t){ const pool=x.e.filter(e=>e!==lastAudioEmo); return pool[Math.floor(Math.random()*pool.length)]; } return 'joy'; }

  const beatRing=document.getElementById('beat-ring');
  function updateVisuals(level,used){
    smoothLevel=smoothLevel*.75+level*.25;
    currentLevel=smoothLevel;
    if(showBar){ const spectrum=used?getSpectrum():new Array(8).fill(0).map(()=>smoothLevel*(0.4+Math.random()*.6)); bars.forEach((b,i)=>{ b.style.height=Math.max(2,Math.round(spectrum[i]*24))+'px'; }); }
    const sc=1+smoothLevel*.12;
    document.querySelectorAll('.eye').forEach(el=>el.style.transform=`scale(${sc})`);
    if(beatCooldown<=0&&smoothLevel>.55){ beatRing.style.boxShadow=`inset 0 0 0 3px ${border}99`; beatCooldown=8; setTimeout(()=>beatRing.style.boxShadow='none',120); }
    if(beatCooldown>0) beatCooldown--;
    if(!audioEmoTimer&&Math.abs(level-currentLevel)>.15){
      audioEmoTimer=setTimeout(()=>{ if(window.eyes?.emotion){ const e=pickAudioEmo(currentLevel); window.eyes.emotion(e); lastAudioEmo=e; } audioEmoTimer=null; },200+Math.random()*300);
    }
  }
  function analysisLoop(){ if(audioReady){ updateVisuals(getLevel(),true); } requestAnimationFrame(analysisLoop); }

  let lastTrackId=null;
  async function pollRadioState(){
    try{
      const r=await fetch(RADIO_STATE_URL,{signal:AbortSignal.timeout(5000)});
      if(!r.ok) return;
      const data=await r.json();
      const pb=data?.playback; if(!pb) return;
      const tid=`${pb.artist}|${pb.title}`;
      if(showTitle){ const label=pb.artist&&pb.title?`\u266a ${pb.artist} \u2014 ${pb.title}`:pb.title||pb.artist||''; document.getElementById('now-playing').textContent=label; }
      if(tid!==lastTrackId&&lastTrackId!==null){ lastTrackId=tid; if(window.eyes?.emotion) window.eyes.emotion('surprise'); if(window.eyes?.target) window.eyes.target(Math.round((Math.random()-.5)*60),-100-Math.round(Math.random()*60),800); setTimeout(()=>{ if(window.eyes?.emotion) window.eyes.emotion('joy'); },2500); } else { lastTrackId=tid; }
    }catch(e){}
    setTimeout(pollRadioState,15000);
  }

  let t=0,seed=Math.random()*1000,gx=0,gy=0;
  function sn(x,s){const v=Math.sin(x*1.234+s*7.89)*43758.5453;return(v-Math.floor(v))*2-1;}
  function setGaze(x,y){ const[nx,ny]=clampGaze(x,y); gx=nx; gy=ny; }
  function microLoop(){
    t+=.012+Math.random()*.008;
    safeMove(gx+sn(t,seed)*(8+currentLevel*24), gy+sn(t,seed+100)*(5+currentLevel*12));
    setTimeout(microLoop,50+Math.random()*50);
  }
  function scheduleGaze(){
    const base=audioReady?4000-currentLevel*2000:4000;
    setTimeout(()=>{
      setGaze((Math.random()-.5)*(60+currentLevel*100),(Math.random()-.5)*(40+currentLevel*60));
      if(window.eyes?.target) window.eyes.target(Math.round(gx*2),Math.round(gy*1.5),600+Math.round(Math.random()*600));
      scheduleGaze();
    },Math.max(800,base+(Math.random()-.5)*base));
  }
  function boot(){
    if(!window.eyes?.emotion){requestAnimationFrame(boot);return;}
    window.eyes.emotion('joy');
    microLoop(); scheduleGaze(); analysisLoop();
    setTimeout(()=>initAudio(),1000);
    setTimeout(()=>pollRadioState(),2000);
  }
  boot();
  </script>
</body>
</html>
