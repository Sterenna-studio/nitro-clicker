<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nitro Clicker - Core FX Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #05070d;
      --panel: rgba(9, 13, 24, .84);
      --border: rgba(0, 255, 204, .16);
      --text: #e8faff;
      --muted: rgba(168, 230, 255, .58);
      --primary: #00ffcc;
      --accent: #ffcc00;
      --pink: #ff3df2;
      --green: #00ff80;
      --core-size: 260px;
      --core-glow: #00ffcc;
      --accent-glow: #ff3df2;
      --shell-fill: .42;
      --shell-crack: .18;
      --panel-intensity: .7;
      --ring-speed: 9s;
      --tendril-count: 10;
      --module-count: 6;
      --sub-core-count: 3;
    }
    html, body { min-height: 100%; margin: 0; background: radial-gradient(circle at 50% -10%, #102031, var(--bg) 58%); color: var(--text); font-family: "Share Tech Mono", monospace; }
    body { padding: 14px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 0 auto 14px; max-width: 1440px; }
    h1 { margin: 0; font-family: "Exo 2", sans-serif; font-size: clamp(18px, 2.8vw, 34px); letter-spacing: .08em; }
    header small { color: var(--muted); display: block; letter-spacing: .16em; font-size: 10px; margin-top: 4px; }
    a, button { font: inherit; }
    .top-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .nav-btn, .btn {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, .04);
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 10px;
      letter-spacing: .12em;
      cursor: pointer;
    }
    .btn.primary { border-color: var(--primary); color: var(--primary); background: rgba(0, 255, 204, .1); }
    main { max-width: 1440px; margin: 0 auto; display: grid; grid-template-columns: minmax(520px, 1.2fr) minmax(360px, .8fr); gap: 14px; align-items: start; }
    @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
    .stage {
      position: sticky;
      top: 12px;
      min-height: min(74vh, 760px);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(0, 255, 204, calc(var(--panel-intensity) * .13)), transparent 24%),
        radial-gradient(circle at 30% 32%, rgba(255, 61, 242, calc(var(--panel-intensity) * .16)), transparent 34%),
        rgba(6, 9, 16, .96);
      box-shadow: inset 0 0 80px rgba(0, 255, 204, .06), 0 18px 54px rgba(0, 0, 0, .32);
    }
    .stage-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: calc(.18 + var(--panel-intensity) * .28);
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 1px, transparent 1px 34px),
        repeating-linear-gradient(90deg, rgba(0,255,204,.05) 0 1px, transparent 1px 42px);
    }
    .core-panel {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      perspective: 1200px;
    }
    .scale-radar, .module-orbit, .tendril-layer, .sub-core-field, .lightning-layer, .overdrive-layer, .custom-layer { position: absolute; inset: 0; pointer-events: none; }
    .scale-radar::before, .scale-radar::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(0,255,204,.18);
      animation: radarSpin 18s linear infinite;
    }
    .scale-radar::before { width: 560px; height: 560px; }
    .scale-radar::after { width: 720px; height: 720px; border-color: rgba(255,61,242,.12); animation-duration: 28s; animation-direction: reverse; }
    .click-core {
      position: relative;
      width: var(--core-size);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid color-mix(in srgb, var(--core-glow) 70%, white 20%);
      background:
        radial-gradient(circle at 28% 22%, rgba(255,255,255,.74), transparent 15%),
        radial-gradient(circle at 46% 42%, color-mix(in srgb, var(--core-glow) 46%, transparent), transparent 34%),
        radial-gradient(circle at 72% 75%, color-mix(in srgb, var(--accent-glow) 40%, transparent), transparent 36%),
        radial-gradient(circle, #081925 0 42%, #02060b 76%);
      box-shadow:
        inset -36px -42px 70px rgba(0,0,0,.72),
        inset 20px 20px 40px rgba(255,255,255,.12),
        0 0 54px color-mix(in srgb, var(--core-glow) 34%, transparent),
        0 0 104px color-mix(in srgb, var(--accent-glow) 18%, transparent);
      transform-style: preserve-3d;
      z-index: 6;
    }
    .core-rings, .core-rings::before, .core-rings::after {
      content: "";
      position: absolute;
      inset: 17%;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--core-glow) 46%, transparent);
      animation: ringSpin var(--ring-speed) linear infinite;
    }
    .core-rings::before { inset: -16%; border-color: rgba(255,204,0,.24); animation-duration: calc(var(--ring-speed) * 1.45); }
    .core-rings::after { inset: 25%; border-color: color-mix(in srgb, var(--accent-glow) 36%, transparent); animation-duration: calc(var(--ring-speed) * .62); animation-direction: reverse; }
    .core-glyph {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--core-glow);
      font-family: "Exo 2", sans-serif;
      font-size: calc(var(--core-size) * .22);
      font-weight: 900;
      text-shadow: 0 0 16px var(--core-glow), 0 0 34px var(--accent-glow);
      z-index: 8;
    }
    .core-shell-visual {
      position: absolute;
      width: calc(var(--core-size) * 1.34);
      aspect-ratio: 1;
      border-radius: 50%;
      z-index: 5;
      opacity: .94;
      border: 1px solid rgba(168,230,255,.32);
      background:
        radial-gradient(circle, rgba(0,255,204, calc(.05 + var(--shell-fill) * .16)), transparent 62%),
        radial-gradient(circle, transparent 54%, rgba(255,204,0, calc(.08 + var(--shell-fill) * .18)) 58%, transparent 68%);
      box-shadow: inset 0 0 52px rgba(0,255,204,.16), 0 0 42px rgba(255,204,0,.12);
    }
    .core-shell-visual::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: var(--shell-crack);
      background:
        linear-gradient(28deg, transparent 48%, rgba(255,255,255,.82) 49%, transparent 50%),
        linear-gradient(121deg, transparent 52%, rgba(0,255,204,.58) 53%, transparent 54%);
      mask-image: radial-gradient(circle, transparent 0 42%, black 46% 70%, transparent 74%);
    }
    .bio-tendril, .spawned-module, .sub-core, .custom-el { position: absolute; left: 50%; top: 50%; }
    .bio-tendril {
      width: var(--len);
      height: 9px;
      transform-origin: 0 50%;
      transform: rotate(var(--angle)) translateX(calc(var(--core-size) * .44));
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(0,255,128,.72), rgba(0,255,204,.36), rgba(255,61,242,.16), transparent);
      box-shadow: 0 0 18px rgba(0,255,204,.28);
      animation: tendrilWrithe 2.8s ease-in-out infinite alternate;
    }
    .spawned-module {
      width: var(--module-width, 52px);
      min-height: 38px;
      display: grid;
      grid-template-rows: 1fr auto 3px;
      place-items: center;
      gap: 1px;
      padding: 6px 7px 5px;
      border-radius: 10px;
      border: 1px solid rgba(0,255,204,.42);
      background: rgba(7,10,20,.88);
      transform: rotate(var(--angle)) translateX(var(--radius, calc(var(--core-size) * .72))) rotate(calc(-1 * var(--angle)));
      box-shadow: 0 0 22px rgba(0,255,204,.2);
    }
    .module-link {
      position: absolute;
      left: 50%;
      top: 50%;
      width: max(42px, calc(var(--radius) - 72px));
      height: 2px;
      transform-origin: 0 50%;
      transform: rotate(var(--angle)) translateX(72px);
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--module-color) 58%, transparent));
      box-shadow: 0 0 12px color-mix(in srgb, var(--module-color) 28%, transparent);
      opacity: calc(.28 + var(--charge) * .58);
    }
    .spawned-module .module-code { font-family: "Exo 2", sans-serif; font-size: 10px; font-weight: 900; line-height: 1; }
    .spawned-module small { display: block; font-size: 7px; color: rgba(232,250,255,.68); line-height: 1; }
    .spawned-module i { display: block; width: 100%; height: 3px; border-radius: 999px; transform: scaleX(var(--charge)); transform-origin: left center; background: currentColor; box-shadow: 0 0 8px currentColor; }
    .sub-core {
      width: var(--sub-size);
      aspect-ratio: 1;
      border-radius: 50%;
      transform: rotate(var(--angle)) translateX(calc(var(--core-size) * 1.1)) rotate(calc(-1 * var(--angle)));
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.3), transparent 18%), radial-gradient(circle, rgba(0,255,204,.28), rgba(255,61,242,.08) 64%, rgba(0,0,0,.82));
      border: 1px solid rgba(0,255,204,.28);
      box-shadow: 0 0 28px rgba(0,255,204,.18);
    }
    .sub-core-link {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(var(--core-size) * .96);
      height: 2px;
      transform-origin: 0 50%;
      transform: rotate(var(--angle));
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(0,255,204,.06), rgba(0,255,204,.4), rgba(255,61,242,.16));
      box-shadow: 0 0 12px rgba(0,255,204,.18);
      opacity: .62;
    }
    .lightning-bolt {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 270px;
      transform-origin: 0 0;
      transform: rotate(var(--angle)) translateY(-135px);
      background: linear-gradient(transparent, rgba(255,255,255,.9), var(--core-glow), transparent);
      filter: drop-shadow(0 0 10px var(--core-glow));
      opacity: .78;
      animation: flicker .62s steps(3, end) infinite;
    }
    .overdrive-shock-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(var(--core-size) * 1.9);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(255,204,0,.36);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 28px rgba(255,204,0,.18);
      animation: shockPulse 1.3s ease-out infinite;
    }
    .custom-el {
      display: grid;
      place-items: center;
      color: var(--custom-color);
      border-color: var(--custom-color);
      box-shadow: 0 0 18px color-mix(in srgb, var(--custom-color) 44%, transparent);
      transform:
        rotate(var(--custom-angle))
        translateX(var(--custom-radius))
        rotate(calc(-1 * var(--custom-angle)))
        translate(-50%, -50%);
      animation: customOrbit var(--custom-speed) linear infinite;
    }
    .custom-el.orb { width: var(--custom-size); aspect-ratio: 1; border-radius: 50%; background: radial-gradient(circle, white 0 10%, var(--custom-color) 32%, transparent 74%); }
    .custom-el.ring { width: var(--custom-size); aspect-ratio: 1; border-radius: 50%; border: 2px solid currentColor; }
    .custom-el.bar { width: calc(var(--custom-size) * 2.4); height: calc(var(--custom-size) * .24); border-radius: 999px; background: currentColor; }
    .custom-el.label { width: auto; min-width: var(--custom-size); padding: 4px 8px; border: 1px solid currentColor; border-radius: 6px; background: rgba(0,0,0,.46); font-size: 10px; letter-spacing: .12em; }
    .controls { display: grid; gap: 12px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 16px 38px rgba(0,0,0,.28);
    }
    .panel h2 { margin: 0 0 10px; color: var(--muted); font-family: "Exo 2", sans-serif; font-size: 11px; letter-spacing: .16em; text-transform: uppercase; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row { display: grid; grid-template-columns: 104px minmax(0, 1fr) 42px; align-items: center; gap: 8px; margin: 7px 0; }
    .row label, .toggle label, .field label { color: var(--muted); font-size: 9px; letter-spacing: .1em; }
    input, select, textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(0,255,204,.16);
      border-radius: 7px;
      background: rgba(0,0,0,.28);
      color: var(--text);
      font: inherit;
      font-size: 10px;
      padding: 7px;
    }
    input[type="range"] { padding: 0; accent-color: var(--primary); }
    input[type="color"] { height: 30px; padding: 2px; }
    .val { color: var(--primary); text-align: right; font-size: 9px; }
    .toggle-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px; }
    .toggle { display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 8px; }
    .toggle input { width: auto; accent-color: var(--primary); }
    .field { display: grid; gap: 5px; }
    textarea { min-height: 160px; resize: vertical; line-height: 1.4; }
    .inventory { display: grid; gap: 7px; }
    .inventory div { display: flex; justify-content: space-between; gap: 10px; border-bottom: 1px solid rgba(255,255,255,.06); padding-bottom: 6px; color: var(--muted); font-size: 9px; }
    .inventory strong { color: var(--text); font-weight: 400; }
    @keyframes ringSpin { to { rotate: 360deg; } }
    @keyframes radarSpin { to { rotate: 360deg; } }
    @keyframes tendrilWrithe { from { scale: .94 1; } to { scale: 1.08 1; filter: brightness(1.3); } }
    @keyframes flicker { 0%,100% { opacity:.2; } 35% { opacity:.9; } 58% { opacity:.45; } }
    @keyframes shockPulse { from { opacity: .7; scale: .72; } to { opacity: 0; scale: 1.18; } }
    @keyframes customOrbit { to { rotate: 360deg; } }
    .fx-off-scaleRadar .scale-radar,
    .fx-off-shell .core-shell-visual,
    .fx-off-rings .core-rings,
    .fx-off-tendrils .tendril-layer,
    .fx-off-modules .module-orbit,
    .fx-off-subcores .sub-core-field,
    .fx-off-lightning .lightning-layer,
    .fx-off-overdrive .overdrive-layer,
    .fx-off-custom .custom-layer { display: none; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>CORE FX EDITOR</h1>
      <small>PROD/DEV PRESET LAB - EXPORT JSON A RENVOYER</small>
    </div>
    <nav class="top-actions">
      <a class="nav-btn" href="./dev-local.html">JEU LOCAL</a>
      <a class="nav-btn" href="./">PROD ENTRY</a>
      <a class="nav-btn" href="./docs/core-fx-inventory.md">INVENTAIRE</a>
    </nav>
  </header>

  <main>
    <section class="stage" id="stage" aria-label="Preview core FX">
      <div class="stage-grid"></div>
      <div class="core-panel" id="preview">
        <div class="scale-radar"></div>
        <div class="tendril-layer" id="tendrils"></div>
        <div class="module-orbit" id="modules"></div>
        <div class="sub-core-field" id="subcores"></div>
        <div class="lightning-layer" id="lightning"></div>
        <div class="overdrive-layer"><div class="overdrive-shock-ring"></div></div>
        <div class="core-shell-visual"></div>
        <button class="click-core" type="button" id="corePreview" aria-label="Preview core"><span class="core-rings"></span><span class="core-glyph">N</span></button>
        <div class="custom-layer" id="customLayer"></div>
      </div>
    </section>

    <aside class="controls">
      <section class="panel">
        <h2>Core tuning</h2>
        <div class="row"><label for="coreSize">Core size</label><input id="coreSize" type="range" min="170" max="360" value="260"><span class="val" id="coreSizeVal">260</span></div>
        <div class="row"><label for="ringSpeed">Ring speed</label><input id="ringSpeed" type="range" min="3" max="24" value="9"><span class="val" id="ringSpeedVal">9s</span></div>
        <div class="row"><label for="panelIntensity">Panel FX</label><input id="panelIntensity" type="range" min="0" max="1" step="0.01" value="0.70"><span class="val" id="panelIntensityVal">.70</span></div>
        <div class="row"><label for="shellFill">Shell fill</label><input id="shellFill" type="range" min="0" max="1" step="0.01" value="0.42"><span class="val" id="shellFillVal">.42</span></div>
        <div class="row"><label for="shellCrack">Shell crack</label><input id="shellCrack" type="range" min="0" max="1" step="0.01" value="0.18"><span class="val" id="shellCrackVal">.18</span></div>
        <div class="grid-2">
          <div class="field"><label for="coreGlow">Core glow</label><input id="coreGlow" type="color" value="#00ffcc"></div>
          <div class="field"><label for="accentGlow">Accent glow</label><input id="accentGlow" type="color" value="#ff3df2"></div>
        </div>
      </section>

      <section class="panel">
        <h2>Layer toggles</h2>
        <div class="toggle-grid" id="toggles"></div>
      </section>

      <section class="panel">
        <h2>Population</h2>
        <div class="row"><label for="tendrilCount">Tendrils</label><input id="tendrilCount" type="range" min="0" max="28" value="10"><span class="val" id="tendrilCountVal">10</span></div>
        <div class="row"><label for="moduleCount">Modules</label><input id="moduleCount" type="range" min="0" max="18" value="6"><span class="val" id="moduleCountVal">6</span></div>
        <div class="row"><label for="subCoreCount">Sub cores</label><input id="subCoreCount" type="range" min="0" max="10" value="3"><span class="val" id="subCoreCountVal">3</span></div>
        <button class="btn" id="randomize" type="button">RANDOMIZE FEEL</button>
      </section>

      <section class="panel">
        <h2>Add element</h2>
        <div class="grid-2">
          <div class="field"><label for="elType">Type</label><select id="elType"><option>orb</option><option>ring</option><option>bar</option><option>label</option></select></div>
          <div class="field"><label for="elText">Text</label><input id="elText" value="SYNC"></div>
          <div class="field"><label for="elColor">Color</label><input id="elColor" type="color" value="#ffcc00"></div>
          <div class="field"><label for="elSize">Size</label><input id="elSize" type="number" value="24" min="6" max="140"></div>
          <div class="field"><label for="elRadius">Radius</label><input id="elRadius" type="number" value="190" min="0" max="420"></div>
          <div class="field"><label for="elAngle">Angle</label><input id="elAngle" type="number" value="0" min="-360" max="360"></div>
          <div class="field"><label for="elSpeed">Speed sec</label><input id="elSpeed" type="number" value="16" min="2" max="80"></div>
        </div>
        <div class="top-actions" style="justify-content:flex-start;margin-top:9px">
          <button class="btn primary" id="addElement" type="button">ADD ELEMENT</button>
          <button class="btn" id="clearElements" type="button">CLEAR CUSTOM</button>
        </div>
      </section>

      <section class="panel">
        <h2>FX inventory</h2>
        <div class="inventory" id="inventory"></div>
      </section>

      <section class="panel">
        <h2>Preset export</h2>
        <textarea id="presetOut" spellcheck="false"></textarea>
        <div class="top-actions" style="justify-content:flex-start;margin-top:9px">
          <button class="btn primary" id="copyPreset" type="button">COPY PRESET</button>
          <button class="btn" id="downloadPreset" type="button">DOWNLOAD JSON</button>
        </div>
      </section>
    </aside>
  </main>

  <script>
    const $ = id => document.getElementById(id);
    const root = document.documentElement;
    const preview = $('preview');
    const layerToggles = [
      ['scaleRadar', 'Scale radar'],
      ['shell', 'Core shell'],
      ['rings', 'Core rings'],
      ['tendrils', 'Tendrils'],
      ['modules', 'Modules'],
      ['subcores', 'Sub cores'],
      ['lightning', 'Lightning'],
      ['overdrive', 'Overdrive ring'],
      ['custom', 'Custom layer'],
    ];
    const inventory = [
      ['click-core', 'main 3D sphere'],
      ['core-rings', 'rotating internal rings'],
      ['core-shell-visual', 'shell fill/crack bubble'],
      ['scale-radar', 'background radar rings'],
      ['sub-core-field', 'sub-core rail field'],
      ['module-orbit', 'grouped module network'],
      ['tendril-layer', 'biopunk tendrils'],
      ['lightning-layer', 'SVG lightning overlay'],
      ['plasma-arc-layer', 'runtime plasma click arcs'],
      ['bounce-canvas', 'click particles inside core'],
      ['dopamine-burst-layer', 'reward sparks and badges'],
      ['overdrive-shard-layer', 'overdrive nova/shards/rings'],
      ['system-wave', 'big core panel text wave'],
      ['fragment-orb', 'collectible fragment orbit'],
      ['core-state-aura', 'disabled status circle'],
    ];
    const customElements = [];
    const state = {
      coreSize: 260,
      ringSpeed: 9,
      panelIntensity: .7,
      shellFill: .42,
      shellCrack: .18,
      coreGlow: '#00ffcc',
      accentGlow: '#ff3df2',
      tendrilCount: 10,
      moduleCount: 6,
      subCoreCount: 3,
      toggles: Object.fromEntries(layerToggles.map(([id]) => [id, true])),
    };

    function bindRange(id, key, suffix = '') {
      const input = $(id);
      const out = $(`${id}Val`);
      input.addEventListener('input', () => {
        state[key] = Number(input.value);
        out.textContent = Number(input.value).toFixed(input.step === '0.01' ? 2 : 0).replace(/^0/, '') + suffix;
        render();
      });
    }

    function bindColor(id, key) {
      $(id).addEventListener('input', () => {
        state[key] = $(id).value;
        render();
      });
    }

    function renderToggles() {
      $('toggles').innerHTML = layerToggles.map(([id, label]) => `
        <div class="toggle"><input id="toggle-${id}" type="checkbox" ${state.toggles[id] ? 'checked' : ''}><label for="toggle-${id}">${label}</label></div>
      `).join('');
      layerToggles.forEach(([id]) => {
        $(`toggle-${id}`).addEventListener('change', event => {
          state.toggles[id] = event.target.checked;
          render();
        });
      });
    }

    function renderInventory() {
      $('inventory').innerHTML = inventory.map(([name, desc]) => `<div><strong>${name}</strong><span>${desc}</span></div>`).join('');
    }

    function renderCounts() {
      $('tendrils').innerHTML = Array.from({ length: state.tendrilCount }, (_, i) => {
        const angle = (360 / Math.max(1, state.tendrilCount)) * i;
        const len = 120 + (i % 5) * 18;
        return `<span class="bio-tendril" style="--angle:${angle}deg;--len:${len}px"></span>`;
      }).join('');
      const groups = [
        ['AMP', '#00ffcc'],
        ['AUTO', '#00ff80'],
        ['OVR', '#ff3df2'],
        ['SHELL', '#ffcc00'],
        ['COREx', '#8fb7ff'],
      ];
      $('modules').innerHTML = Array.from({ length: state.moduleCount }, (_, i) => {
        const angle = (360 / Math.max(1, state.moduleCount)) * i + 12;
        const group = groups[i % groups.length];
        const radius = 175 + (i % 4) * 22;
        const charge = Math.min(1, .16 + (i + 1) / Math.max(1, state.moduleCount));
        const level = (i + 1) * 3;
        const width = Math.min(76, 46 + Math.min(level, 40) * .72);
        return `
          <span class="module-link" style="--angle:${angle}deg;--radius:${radius}px;--charge:${charge};--module-color:${group[1]}"></span>
          <span class="spawned-module" style="--angle:${angle}deg;--radius:${radius}px;--charge:${charge};--module-color:${group[1]};--module-width:${width}px;color:${group[1]}"><span class="module-code">${group[0]}</span><small>Lv.${level}</small><i></i></span>
        `;
      }).join('');
      $('subcores').innerHTML = Array.from({ length: state.subCoreCount }, (_, i) => {
        const angle = (360 / Math.max(1, state.subCoreCount)) * i - 90;
        const size = 54 + (i % 3) * 10;
        return `
          <span class="sub-core-link" style="--angle:${angle}deg"></span>
          <span class="sub-core" style="--angle:${angle}deg;--sub-size:${size}px"></span>
        `;
      }).join('');
      $('lightning').innerHTML = Array.from({ length: 5 }, (_, i) => `<span class="lightning-bolt" style="--angle:${i * 72 + 18}deg"></span>`).join('');
    }

    function renderCustom() {
      $('customLayer').innerHTML = customElements.map((el, index) => `
        <span class="custom-el ${el.type}" data-index="${index}" style="--custom-color:${el.color};--custom-size:${el.size}px;--custom-radius:${el.radius}px;--custom-angle:${el.angle}deg;--custom-speed:${el.speed}s">${el.type === 'label' ? el.text : ''}</span>
      `).join('');
    }

    function renderPreset() {
      const preset = {
        kind: 'nitro-core-fx-preset',
        version: 1,
        generatedAt: new Date().toISOString(),
        settings: state,
        customElements,
        disabledRuntimeLayers: ['core-state-aura'],
      };
      $('presetOut').value = JSON.stringify(preset, null, 2);
    }

    function render() {
      root.style.setProperty('--core-size', `${state.coreSize}px`);
      root.style.setProperty('--ring-speed', `${state.ringSpeed}s`);
      root.style.setProperty('--panel-intensity', state.panelIntensity);
      root.style.setProperty('--shell-fill', state.shellFill);
      root.style.setProperty('--shell-crack', state.shellCrack);
      root.style.setProperty('--core-glow', state.coreGlow);
      root.style.setProperty('--accent-glow', state.accentGlow);
      layerToggles.forEach(([id]) => {
        preview.classList.toggle(`fx-off-${id}`, !state.toggles[id]);
      });
      renderCounts();
      renderCustom();
      renderPreset();
    }

    $('addElement').addEventListener('click', () => {
      customElements.push({
        type: $('elType').value,
        text: $('elText').value,
        color: $('elColor').value,
        size: Number($('elSize').value),
        radius: Number($('elRadius').value),
        angle: Number($('elAngle').value),
        speed: Number($('elSpeed').value),
      });
      render();
    });
    $('clearElements').addEventListener('click', () => {
      customElements.length = 0;
      render();
    });
    $('randomize').addEventListener('click', () => {
      state.ringSpeed = 4 + Math.round(Math.random() * 16);
      state.panelIntensity = Math.round((.35 + Math.random() * .6) * 100) / 100;
      state.shellFill = Math.round(Math.random() * 100) / 100;
      state.shellCrack = Math.round(Math.random() * 45) / 100;
      state.tendrilCount = Math.floor(4 + Math.random() * 20);
      state.moduleCount = Math.floor(2 + Math.random() * 12);
      state.subCoreCount = Math.floor(Math.random() * 8);
      ['ringSpeed','panelIntensity','shellFill','shellCrack','tendrilCount','moduleCount','subCoreCount'].forEach(key => {
        const input = $(key);
        const out = $(`${key}Val`);
        if (input) input.value = state[key];
        if (out) out.textContent = String(state[key]).replace(/^0/, '') + (key === 'ringSpeed' ? 's' : '');
      });
      render();
    });
    $('copyPreset').addEventListener('click', async () => {
      await navigator.clipboard?.writeText($('presetOut').value).catch(() => {});
    });
    $('downloadPreset').addEventListener('click', () => {
      const blob = new Blob([$('presetOut').value], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'nitro-core-fx-preset.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    bindRange('coreSize', 'coreSize');
    bindRange('ringSpeed', 'ringSpeed', 's');
    bindRange('panelIntensity', 'panelIntensity');
    bindRange('shellFill', 'shellFill');
    bindRange('shellCrack', 'shellCrack');
    bindRange('tendrilCount', 'tendrilCount');
    bindRange('moduleCount', 'moduleCount');
    bindRange('subCoreCount', 'subCoreCount');
    bindColor('coreGlow', 'coreGlow');
    bindColor('accentGlow', 'accentGlow');
    renderToggles();
    renderInventory();
    render();
  </script>
</body>
</html>
