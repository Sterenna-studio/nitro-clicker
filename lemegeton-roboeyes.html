<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEMEGETON · RoboEyes (canvas)</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#00ffcc;--text:#cfe6f2;--muted:rgba(160,200,225,.55);--border:rgba(0,255,204,.18);--surface:#0c1218;--mono:'Share Tech Mono',monospace;--display:'Exo 2',sans-serif}
    html,body{min-height:100vh;background:radial-gradient(circle at 50% -10%,#0a1622,#06090e 60%);color:var(--text);font-family:var(--mono)}
    header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border)}
    header h1{font-family:var(--display);font-size:15px;letter-spacing:.16em;color:var(--primary)}
    header small{font-size:9px;letter-spacing:.2em;color:var(--muted);display:block}
    .top-actions a{color:var(--text);text-decoration:none;font-size:10px;letter-spacing:.14em;border:1px solid var(--border);padding:7px 12px;border-radius:8px;margin-left:6px}
    .top-actions a:hover{border-color:var(--primary);color:var(--primary)}
    main{display:grid;grid-template-columns:1fr 300px;gap:16px;padding:16px;max-width:1200px;margin:0 auto}
    @media(max-width:820px){main{grid-template-columns:1fr}}
    .stage{position:relative;min-height:60vh;border-radius:16px;overflow:hidden;border:1px solid rgba(0,255,204,.3);background:radial-gradient(circle at 50% 40%,rgba(0,255,204,.06),transparent 60%),#02060b;box-shadow:inset 0 0 60px rgba(0,255,204,.08)}
    canvas{display:block;width:100%;height:100%;cursor:crosshair}
    .controls{display:flex;flex-direction:column;gap:14px}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
    .panel h2{font-family:var(--display);font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
    .btn-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
    button.emo{font-family:var(--mono);font-size:10px;color:var(--text);background:rgba(0,255,204,.06);border:1px solid var(--border);border-radius:8px;padding:8px 6px;cursor:pointer}
    button.emo:hover{background:rgba(0,255,204,.16);border-color:var(--primary);color:var(--primary)}
    .row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .row label{flex:0 0 84px;font-size:9px;color:var(--muted)}
    .row input[type=range]{flex:1;accent-color:var(--primary)}
    .row input[type=color]{width:38px;height:26px;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer}
    .row .val{flex:0 0 38px;text-align:right;font-size:9px;color:var(--primary)}
    .reset{width:100%;padding:9px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:var(--mono);font-size:10px;letter-spacing:.14em;cursor:pointer}
    .reset:hover{border-color:var(--primary);color:var(--primary)}
    .log{font-size:9px;color:var(--muted);margin-top:8px}
  </style>
</head>
<body>
  <header>
    <div><h1>⬡ LEMEGETON · ROBOEYES</h1><small>STYLE FLUXGARAGE · CANVAS · TEST</small></div>
    <nav class="top-actions"><a href="./lemegeton-compare.html">⇆ COMPARER</a><a href="./">▶ JOUER</a></nav>
  </header>
  <main>
    <section class="stage"><canvas id="cv"></canvas></section>
    <aside class="controls">
      <div class="panel">
        <h2>Humeur</h2>
        <div class="btn-grid" id="moods"></div>
      </div>
      <div class="panel">
        <h2>Réglages</h2>
        <div class="row"><label>Taille</label><input type="range" id="size" min="0.5" max="1.6" step="0.05" value="1"><span class="val" id="sizeVal">1.0</span></div>
        <div class="row"><label>Écart</label><input type="range" id="gap" min="0.05" max="0.5" step="0.01" value="0.22"><span class="val" id="gapVal">.22</span></div>
        <div class="row"><label>Couleur</label><input type="color" id="color" value="#00ffcc"></div>
        <button class="reset" id="blink" style="margin-top:6px">😉 CLIGNER</button>
      </div>
      <div class="panel">
        <button class="reset" id="export" style="margin-bottom:8px;border-color:var(--primary);color:var(--primary)">📤 EXPORTER</button>
        <div class="log" id="log">RoboEyes canvas — prêt</div>
      </div>
    </aside>
  </main>
  <script>
    const $ = id => document.getElementById(id);
    const cv = $('cv'), ctx = cv.getContext('2d');
    const S = { lookX:0, lookY:0, tgtX:0, tgtY:0, blink:0, blinkTarget:0, mood:'default', size:1, gap:0.22, color:'#00ffcc' };
    const MOODS = ['default','happy','tired','angry'];
    let W=0,H=0,dpr=1;
    function resize(){ dpr=Math.min(2,window.devicePixelRatio||1); W=cv.clientWidth; H=cv.clientHeight; cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
    new ResizeObserver(resize).observe(cv); resize();

    function rr(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

    function drawEye(cx,cy,w,h,side){
      const r=Math.min(w,h)*0.34;
      // corps de l'œil
      const g=ctx.createRadialGradient(cx,cy-h*0.1,2,cx,cy,w);
      g.addColorStop(0,'#eafff9'); g.addColorStop(.5,S.color); g.addColorStop(1,'#0090c8');
      ctx.save();
      ctx.shadowColor=S.color; ctx.shadowBlur=24;
      ctx.fillStyle=g; rr(cx-w/2,cy-h/2,w,h,r); ctx.fill();
      ctx.restore();
      // paupières d'humeur, peintes en couleur de fond (découpe)
      ctx.fillStyle='#02060b';
      if(S.mood==='happy'){ ctx.beginPath(); ctx.ellipse(cx,cy+h*0.55,w*0.85,h*0.8,0,0,Math.PI*2); ctx.fill(); }
      else if(S.mood==='tired'){ ctx.beginPath(); ctx.moveTo(cx-w/2-2,cy-h/2-2); ctx.lineTo(cx+w/2+2,cy-h/2-2); ctx.lineTo(cx-w/2-2,cy-h*0.02); ctx.closePath(); ctx.fill(); }
      else if(S.mood==='angry'){ ctx.beginPath(); ctx.moveTo(cx-w/2-2,cy-h/2-2); ctx.lineTo(cx+w/2+2,cy-h/2-2); ctx.lineTo(cx+ side*(w/2)+ -side*0, cy-h*0.02); ctx.lineTo(cx+ (side>0? w/2+2 : -w/2-2), cy-h*0.02); ctx.closePath();
        // brow incliné : recouvre le haut intérieur
        ctx.beginPath(); ctx.moveTo(cx-side*(w/2+2),cy-h/2-2); ctx.lineTo(cx+side*(w/2+2),cy-h/2-2); ctx.lineTo(cx-side*(w/2+2),cy+h*0.05); ctx.closePath(); ctx.fill(); }
    }

    function frame(){
      // lissage du regard
      S.lookX += (S.tgtX - S.lookX)*0.15;
      S.lookY += (S.tgtY - S.lookY)*0.15;
      S.blink += (S.blinkTarget - S.blink)*0.4;
      if(S.blink>0.92) S.blinkTarget=0;
      ctx.clearRect(0,0,W,H);
      const eyeW=W*0.17*S.size, eyeH=H*0.4*S.size;
      const gapPx=W*S.gap;
      const cx=W/2, cy=H/2;
      const eh=eyeH*(1-0.94*S.blink);
      drawEye(cx-(eyeW*0.5+gapPx*0.5)+S.lookX, cy+S.lookY, eyeW, eh, -1);
      drawEye(cx+(eyeW*0.5+gapPx*0.5)+S.lookX, cy+S.lookY, eyeW, eh, 1);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // auto-blink + idle
    setInterval(()=>{ if(Math.random()<0.6) S.blinkTarget=1; }, 3200);
    setInterval(()=>{ S.tgtX=(Math.random()*2-1)*W*0.06; S.tgtY=(Math.random()*2-1)*H*0.05; setTimeout(()=>{S.tgtX=0;S.tgtY=0;},1400); }, 5200);

    // contrôles
    const mg=$('moods');
    MOODS.forEach(m=>{ const b=document.createElement('button'); b.className='emo'; b.textContent=m; b.onclick=()=>{S.mood=m;$('log').textContent='humeur: '+m;}; mg.appendChild(b); });
    $('size').oninput=()=>{S.size=+$('size').value;$('sizeVal').textContent=S.size.toFixed(2);};
    $('gap').oninput=()=>{S.gap=+$('gap').value;$('gapVal').textContent=S.gap.toFixed(2);};
    $('color').oninput=()=>{S.color=$('color').value;};
    $('blink').onclick=()=>{S.blinkTarget=1;};
    cv.addEventListener('click',e=>{ const r=cv.getBoundingClientRect(); S.tgtX=Math.max(-W*0.12,Math.min(W*0.12,(e.clientX-r.left-W/2)*0.5)); S.tgtY=Math.max(-H*0.1,Math.min(H*0.1,(e.clientY-r.top-H/2)*0.5)); });
    $('export').onclick=()=>{
      const p={lib:'RoboEyes-style (canvas maison)',humeur:S.mood,taille:S.size,ecart:S.gap,couleur:S.color,exporte_le:new Date().toISOString()};
      const j=JSON.stringify(p,null,2); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([j],{type:'application/json'})); a.download='roboeyes-params.json'; a.click(); URL.revokeObjectURL(a.href);
      navigator.clipboard?.writeText(j).catch(()=>{}); $('log').textContent='paramètres exportés';
    };
  </script>
</body>
</html>
