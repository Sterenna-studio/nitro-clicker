name: Deploy Nitro Clicker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-nitro-clicker-ovh
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Clicker to Nitro via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add deployment marker
        run: |
          echo "Nitro Clicker deploy" > deploy-test.txt
          echo "Commit: $GITHUB_SHA" >> deploy-test.txt
          echo "Date: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> deploy-test.txt
          echo "{}" | jq \
            --arg commit "${GITHUB_SHA:0:7}" \
            --arg commitFull "${GITHUB_SHA}" \
            --arg message "$(git log -1 --format='%s')" \
            --arg branch "${GITHUB_REF_NAME}" \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg runNumber "${GITHUB_RUN_NUMBER}" \
            --arg deployedAt "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            '. + {commit:$commit,commitFull:$commitFull,message:$message,branch:$branch,runId:$runId,runNumber:$runNumber,deployedAt:$deployedAt}' \
            > deploy-info.json

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/ovh_key
          chmod 600 ~/.ssh/ovh_key
          ssh-keyscan -H "${{ secrets.OVH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote target directory exists
        run: |
          ssh -i ~/.ssh/ovh_key "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}" "mkdir -p ~/nitro/clicker"

      - name: Deploy to Nitro with rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='README.md' \
            --exclude='docs/' \
            -e "ssh -i ~/.ssh/ovh_key" \
            ./ "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:~/nitro/clicker/"
