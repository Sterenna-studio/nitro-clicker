<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nitro Clicker — Debug Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #090b0e;
      --surface:   #0e1117;
      --surface2:  #141920;
      --border:    rgba(0,255,204,.13);
      --border2:   rgba(0,255,204,.22);
      --text:      #c8dff0;
      --muted:     rgba(168,210,255,.5);
      --accent:    #00ffcc;
      --red:       #ff4757;
      --gold:      #ffd32a;
      --mono:      'Share Tech Mono', monospace;
      --display:   'Exo 2', sans-serif;
      --radius:    10px;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Layout ── */
    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header h1 {
      font-family: var(--display);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .14em;
      color: var(--accent);
    }

    header small {
      font-size: 9px;
      letter-spacing: .18em;
      color: var(--muted);
    }

    .header-actions { display: flex; gap: 8px; }

    .main-grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
      height: calc(100vh - 49px);
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      background: var(--surface);
    }

    .sidebar-section { border-bottom: 1px solid var(--border); }

    .sidebar-title {
      padding: 8px 14px;
      font-size: 8px;
      letter-spacing: .2em;
      color: var(--muted);
      text-transform: uppercase;
      background: rgba(0,0,0,.2);
    }

    .nav-btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      text-align: left;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .10em;
      color: var(--text);
      background: none;
      border: none;
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: background .12s, border-color .12s, color .12s;
    }
    .nav-btn:hover  { background: rgba(0,255,204,.05); border-left-color: rgba(0,255,204,.3); }
    .nav-btn.active { background: rgba(0,255,204,.08); border-left-color: var(--accent); color: var(--accent); }

    /* ── Content ── */
    .content {
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Section heading ── */
    .section-head {
      font-family: var(--display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .14em;
      color: #e8faff;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    /* ── Cards & panels ── */
    .card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    /* ── Fields ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 9px;
      letter-spacing: .15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    input[type="number"],
    input[type="text"] {
      background: rgba(0,0,0,.35);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 9px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      width: 100%;
      transition: border-color .15s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,255,204,.12);
    }

    /* ── Upgrade grid ── */
    .upgrade-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }

    .upgrade-card {
      background: rgba(0,0,0,.25);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .upgrade-icon { font-size: 18px; flex: 0 0 auto; }

    .upgrade-info { flex: 1; min-width: 0; }
    .upgrade-info strong {
      display: block;
      font-family: var(--display);
      font-size: 10px;
      font-weight: 700;
      color: #e8faff;
      letter-spacing: .08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .upgrade-info small {
      display: block;
      font-size: 8.5px;
      color: var(--muted);
      margin-top: 1px;
    }

    .upgrade-info .badge {
      display: inline-block;
      margin-top: 3px;
      padding: 1px 5px;
      border-radius: 999px;
      font-size: 7px;
      letter-spacing: .12em;
      background: rgba(255,204,0,.14);
      color: var(--gold);
      border: 1px solid rgba(255,204,0,.25);
    }

    .upgrade-lvl {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .upgrade-lvl input {
      width: 54px;
      text-align: center;
      padding: 4px 6px;
    }

    /* ── Milestone grid ── */
    .milestone-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .milestone-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,.25);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .milestone-row .ms-icon {
      font-size: 16px;
      flex: 0 0 auto;
    }

    .milestone-row .ms-info { flex: 1; min-width: 0; }
    .milestone-row .ms-info strong {
      display: block;
      font-size: 11px;
      color: #e8faff;
    }
    .milestone-row .ms-info small {
      font-size: 9px;
      color: var(--muted);
    }

    .toggle-btn {
      flex: 0 0 auto;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .12em;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .toggle-btn.on  { border-color: var(--accent); color: #02050a; background: var(--accent); }
    .toggle-btn.off { border-color: rgba(255,255,255,.2); color: var(--muted); background: transparent; }
    .toggle-btn.on:hover  { background: #00ccaa; }
    .toggle-btn.off:hover { background: rgba(255,255,255,.08); color: var(--text); }

    /* ── Buttons ── */
    .btn {
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      cursor: pointer;
      transition: filter .15s, transform .1s;
    }
    .btn:hover  { filter: brightness(1.15); }
    .btn:active { transform: scale(.97); }

    .btn-primary  { background: var(--accent);      color: #02050a;  border-color: var(--accent); }
    .btn-danger   { background: var(--red);         color: #fff;     border-color: var(--red); }
    .btn-gold     { background: var(--gold);        color: #02050a;  border-color: var(--gold); }
    .btn-ghost    { background: transparent;        color: var(--text); border-color: rgba(255,255,255,.18); }
    .btn-ghost:hover { background: rgba(255,255,255,.07); }

    /* ── JSON viewer ── */
    textarea.json-box {
      width: 100%;
      min-height: 280px;
      background: rgba(0,0,0,.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: rgba(168,255,200,.85);
      font-family: var(--mono);
      font-size: 11px;
      resize: vertical;
      white-space: pre;
      tab-size: 2;
    }
    textarea.json-box:focus { outline: none; border-color: var(--accent); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid var(--accent);
      background: rgba(5,15,20,.96);
      color: var(--accent);
      font-size: 11px;
      letter-spacing: .10em;
      box-shadow: 0 0 22px rgba(0,255,204,.18);
      transform: translateY(8px);
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.err  { border-color: var(--red); color: var(--red); box-shadow: 0 0 22px rgba(255,71,87,.18); }

    /* ── Stats bar ── */
    .stat-bar {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    .stat-tile {
      padding: 10px 12px;
      background: rgba(0,0,0,.25);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .stat-tile label { display: block; font-size: 8px; margin-bottom: 3px; }
    .stat-tile strong { font-size: 15px; color: var(--accent); font-family: var(--display); }

    /* ── Layer badges ── */
    .layer-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .layer-badge {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.15);
      font-size: 9px;
      letter-spacing: .12em;
      color: var(--muted);
    }
    .layer-badge.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,.08); }

    /* ── Hidden tabs ── */
    .tab-content { display: none; }
    .tab-content.active { display: contents; }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .main-grid { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .sidebar { flex-direction: row; overflow-x: auto; overflow-y: hidden; border-right: none; border-bottom: 1px solid var(--border); height: auto; }
      .sidebar-section { border-bottom: none; border-right: 1px solid var(--border); }
      .sidebar-title { display: none; }
      .nav-btn { white-space: nowrap; border-left: none; border-bottom: 2px solid transparent; }
      .nav-btn.active { border-left-color: transparent; border-bottom-color: var(--accent); }
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div>
      <h1>⬡ NITRO DEBUG CONSOLE</h1>
      <small id="hd-version">VERSION — · SAVE : aucune</small>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="btn-save-apply">💾 APPLIQUER &amp; SAUVER</button>
      <button class="btn btn-ghost"   id="btn-reload">↺ RECHARGER SAVE</button>
      <a href="./" class="btn btn-ghost">▶ JOUER</a>
    </div>
  </header>

  <div class="main-grid">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Éditeur</div>
        <button class="nav-btn active" data-tab="stats">📊 Stats &amp; ressources</button>
        <button class="nav-btn"        data-tab="upgrades">⚡ Upgrades</button>
        <button class="nav-btn"        data-tab="milestones">🏆 Milestones</button>
        <button class="nav-btn"        data-tab="shell">◉ Core Shell</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Save</div>
        <button class="nav-btn" data-tab="json">{ } JSON brut</button>
        <button class="nav-btn" data-tab="import">📥 Import / Export</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Actions</div>
        <button class="nav-btn" data-tab="actions">⚙ Actions rapides</button>
      </div>
    </nav>

    <!-- Content -->
    <main class="content" id="content">
      <!-- Chargement -->
      <p style="color:var(--muted);letter-spacing:.12em">Chargement de la save...</p>
    </main>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import {
  VERSION, UPGRADES, MILESTONES, SCALING_LAYERS,
  createDefaultState, hydrateState,
  recalcDerivedStats, prestigeRequirement,
  getScalingLayer,
} from './js/clicker-state.js';

const PREFIX = 'nitro-clicker.save.';

// ── Save helpers ─────────────────────────────────────────────
function getSaveKey() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith(PREFIX));
  let best = null, bestKey = null;
  for (const k of keys) {
    try {
      const d = JSON.parse(localStorage.getItem(k));
      if (!best || (d?.updatedAt ?? 0) > (best?.updatedAt ?? 0)) { best = d; bestKey = k; }
    } catch {}
  }
  return bestKey ?? `${PREFIX}guest`;
}

function loadSave() {
  const key = getSaveKey();
  try {
    const raw = JSON.parse(localStorage.getItem(key) ?? 'null');
    return hydrateState(raw ?? createDefaultState('guest'), raw?.userId ?? 'guest');
  } catch { return createDefaultState('guest'); }
}

function writeSave(state) {
  const key = getSaveKey();
  state.updatedAt = Date.now();
  state.version   = VERSION;
  localStorage.setItem(key, JSON.stringify(state));
}

function fmt(n) {
  const v = Math.floor(Number(n ?? 0));
  if (v >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(2)+'M';
  if (v >= 1e5) return (v/1e3).toFixed(1)+'K';
  return v.toLocaleString('fr-FR');
}

// ── State ────────────────────────────────────────────────────
let S = loadSave();
let activeTab = 'stats';

// ── Toast ────────────────────────────────────────────────────
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' err' : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.className = '', 2400);
}

// ── Header ───────────────────────────────────────────────────
function updateHeader() {
  const req = prestigeRequirement(S);
  const layer = getScalingLayer(S);
  document.getElementById('hd-version').textContent =
    `VERSION ${VERSION} · Prestige ${S.prestige} · ${layer.short} · Prochaine req : ${fmt(req)}`;
}

// ── Render tabs ──────────────────────────────────────────────
function render() {
  updateHeader();
  const content = document.getElementById('content');
  content.innerHTML = '';

  if (activeTab === 'stats')      renderStats(content);
  else if (activeTab === 'upgrades')  renderUpgrades(content);
  else if (activeTab === 'milestones') renderMilestones(content);
  else if (activeTab === 'shell')     renderShell(content);
  else if (activeTab === 'json')      renderJson(content);
  else if (activeTab === 'import')    renderImport(content);
  else if (activeTab === 'actions')   renderActions(content);
}

// ── Tab: Stats ───────────────────────────────────────────────
function renderStats(root) {
  const layer = getScalingLayer(S);
  const req   = prestigeRequirement(S);

  root.insertAdjacentHTML('beforeend', `
    <div class="section-head">STATS &amp; RESSOURCES</div>

    <div class="stat-bar">
      <div class="stat-tile"><label>ÉNERGIE</label><strong>${fmt(S.energy)}</strong></div>
      <div class="stat-tile"><label>ÉNERGIE TOTALE</label><strong>${fmt(S.totalEnergy)}</strong></div>
      <div class="stat-tile"><label>ÉNERGIE LIFETIME</label><strong>${fmt(S.lifetimeEnergy)}</strong></div>
      <div class="stat-tile"><label>FRAGMENTS</label><strong>${fmt(S.fragments)}</strong></div>
      <div class="stat-tile"><label>FRAGMENTS TOTAUX</label><strong>${fmt(S.totalFragments)}</strong></div>
      <div class="stat-tile"><label>PRESTIGE</label><strong>${S.prestige}</strong></div>
      <div class="stat-tile"><label>CLICS TOTAUX</label><strong>${fmt(S.totalClicks)}</strong></div>
      <div class="stat-tile"><label>PUISSANCE CLIC</label><strong>${S.clickPower.toFixed(2)}</strong></div>
      <div class="stat-tile"><label>PASSIF / SEC</label><strong>${S.passiveRate.toFixed(2)}</strong></div>
      <div class="stat-tile"><label>SURCHARGE</label><strong>${S.surcharge.toFixed(1)} / ${S.maxSurcharge}</strong></div>
      <div class="stat-tile"><label>MULT. PERMANENT</label><strong>${S.permanentMultiplier.toFixed(4)}</strong></div>
      <div class="stat-tile"><label>PROCHAINE REQ.</label><strong>${fmt(req)}</strong></div>
    </div>

    <div class="section-head" style="margin-top:8px">ÉDITER LES RESSOURCES</div>
    <div class="card">
      <div class="grid3">
        <div class="field"><label>Énergie</label><input type="number" id="f-energy" value="${Math.floor(S.energy)}" min="0"></div>
        <div class="field"><label>Énergie totale</label><input type="number" id="f-totalEnergy" value="${Math.floor(S.totalEnergy)}" min="0"></div>
        <div class="field"><label>Énergie lifetime</label><input type="number" id="f-lifetimeEnergy" value="${Math.floor(S.lifetimeEnergy)}" min="0"></div>
        <div class="field"><label>Fragments</label><input type="number" id="f-fragments" value="${Math.floor(S.fragments)}" min="0"></div>
        <div class="field"><label>Fragments totaux</label><input type="number" id="f-totalFragments" value="${Math.floor(S.totalFragments)}" min="0"></div>
        <div class="field"><label>Prestige</label><input type="number" id="f-prestige" value="${S.prestige}" min="0"></div>
        <div class="field"><label>Clics totaux</label><input type="number" id="f-totalClicks" value="${Math.floor(S.totalClicks)}" min="0"></div>
        <div class="field"><label>Surcharge actuelle</label><input type="number" id="f-surcharge" value="${S.surcharge.toFixed(1)}" min="0"></div>
        <div class="field"><label>Mult. permanent</label><input type="number" id="f-permanentMult" value="${S.permanentMultiplier.toFixed(4)}" step="0.001" min="0"></div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn btn-primary" id="btn-apply-stats">✓ Appliquer stats</button>
      </div>
    </div>

    <div class="section-head" style="margin-top:4px">ÉCHELLE DE PRESTIGE</div>
    <div class="card">
      <div class="layer-list" id="layer-list"></div>
    </div>
  `);

  // Layers
  const ll = document.getElementById('layer-list');
  SCALING_LAYERS.forEach(l => {
    const active = layer.id === l.id;
    ll.insertAdjacentHTML('beforeend',
      `<span class="layer-badge${active ? ' active' : ''}">${l.short} · P${l.prestige} · ×${l.mult} ${active ? '← actuel' : ''}</span>`);
  });

  document.getElementById('btn-apply-stats').addEventListener('click', () => {
    S.energy           = Math.max(0, Number(document.getElementById('f-energy').value) || 0);
    S.totalEnergy      = Math.max(0, Number(document.getElementById('f-totalEnergy').value) || 0);
    S.lifetimeEnergy   = Math.max(0, Number(document.getElementById('f-lifetimeEnergy').value) || 0);
    S.fragments        = Math.max(0, Number(document.getElementById('f-fragments').value) || 0);
    S.totalFragments   = Math.max(0, Number(document.getElementById('f-totalFragments').value) || 0);
    S.prestige         = Math.max(0, Math.floor(Number(document.getElementById('f-prestige').value) || 0));
    S.totalClicks      = Math.max(0, Math.floor(Number(document.getElementById('f-totalClicks').value) || 0));
    S.surcharge        = Math.max(0, Number(document.getElementById('f-surcharge').value) || 0);
    S.permanentMultiplier = Math.max(1, Number(document.getElementById('f-permanentMult').value) || 1);
    recalcDerivedStats(S);
    render();
    toast('Stats mises à jour ✓');
  });
}

// ── Tab: Upgrades ────────────────────────────────────────────
function renderUpgrades(root) {
  root.insertAdjacentHTML('beforeend', `
    <div class="section-head">UPGRADES</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">
      <button class="btn btn-ghost" id="btn-up-maxall">⬆ Max tout</button>
      <button class="btn btn-ghost" id="btn-up-zero">✕ Tout à zéro</button>
      <button class="btn btn-primary" id="btn-up-apply">✓ Appliquer upgrades</button>
    </div>
    <div class="upgrade-grid" id="upgrade-grid"></div>
  `);

  const grid = document.getElementById('upgrade-grid');
  UPGRADES.forEach(up => {
    const lvl = S.upgrades?.[up.id] ?? 0;
    const persistent = up.currency === 'fragments' || up.persistent;
    grid.insertAdjacentHTML('beforeend', `
      <div class="upgrade-card">
        <span class="upgrade-icon">${up.icon}</span>
        <div class="upgrade-info">
          <strong>${up.name}</strong>
          <small>Tier ${up.tier} · ${up.currency === 'fragments' ? 'Fragments' : 'Énergie'}</small>
          ${persistent ? '<span class="badge">PERSISTANT</span>' : ''}
        </div>
        <div class="upgrade-lvl">
          <label style="font-size:8px;letter-spacing:.12em;color:var(--muted)">LV.</label>
          <input type="number" class="up-input" data-id="${up.id}" value="${lvl}" min="0" max="9999">
        </div>
      </div>
    `);
  });

  document.getElementById('btn-up-maxall').addEventListener('click', () => {
    document.querySelectorAll('.up-input').forEach(inp => inp.value = 50);
  });
  document.getElementById('btn-up-zero').addEventListener('click', () => {
    document.querySelectorAll('.up-input').forEach(inp => inp.value = 0);
  });
  document.getElementById('btn-up-apply').addEventListener('click', () => {
    document.querySelectorAll('.up-input').forEach(inp => {
      S.upgrades[inp.dataset.id] = Math.max(0, Math.floor(Number(inp.value) || 0));
    });
    recalcDerivedStats(S);
    render();
    toast('Upgrades appliqués ✓');
  });
}

// ── Tab: Milestones ──────────────────────────────────────────
function renderMilestones(root) {
  root.insertAdjacentHTML('beforeend', `
    <div class="section-head">MILESTONES</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">
      <button class="btn btn-ghost" id="btn-ms-all">✓ Tout valider</button>
      <button class="btn btn-ghost" id="btn-ms-none">✕ Tout effacer</button>
    </div>
    <div class="milestone-list" id="ms-list"></div>
  `);

  const list = document.getElementById('ms-list');
  const ICONS = { energy_100:'⚡', energy_1000:'🔋', clicks_250:'🖱', passive_10:'📡',
                  shell_first_stack:'◉', shell_first_break:'💥', first_prestige:'✦',
                  prestige_3:'🌀', prestige_10:'🏭', prestige_25:'🌐' };

  MILESTONES.forEach(m => {
    const done = !!S.milestones?.[m.id];
    list.insertAdjacentHTML('beforeend', `
      <div class="milestone-row">
        <span class="ms-icon">${ICONS[m.id] ?? '◇'}</span>
        <div class="ms-info">
          <strong>${m.label}</strong>
          <small>${m.desc}</small>
        </div>
        <button class="toggle-btn ${done ? 'on' : 'off'}" data-ms="${m.id}">
          ${done ? 'VALIDÉ' : 'NON FAIT'}
        </button>
      </div>
    `);
  });

  list.addEventListener('click', e => {
    const btn = e.target.closest('.toggle-btn');
    if (!btn) return;
    const id = btn.dataset.ms;
    if (S.milestones?.[id]) {
      delete S.milestones[id];
      btn.className = 'toggle-btn off';
      btn.textContent = 'NON FAIT';
    } else {
      S.milestones[id] = Date.now();
      btn.className = 'toggle-btn on';
      btn.textContent = 'VALIDÉ';
    }
  });

  document.getElementById('btn-ms-all').addEventListener('click', () => {
    MILESTONES.forEach(m => { S.milestones[m.id] = S.milestones[m.id] || Date.now(); });
    render();
  });
  document.getElementById('btn-ms-none').addEventListener('click', () => {
    S.milestones = {};
    render();
  });
}

// ── Tab: Shell ───────────────────────────────────────────────
function renderShell(root) {
  const cs = S.coreShell ?? {};
  root.insertAdjacentHTML('beforeend', `
    <div class="section-head">CORE SHELL</div>
    <div class="card">
      <div class="grid3">
        <div class="field"><label>Fragments stockés</label><input type="number" id="sh-stored" value="${Math.floor(cs.storedFragments ?? 0)}" min="0"></div>
        <div class="field"><label>Fissures (cracks)</label><input type="number" id="sh-cracks" value="${Math.floor(cs.cracks ?? 0)}" min="0"></div>
        <div class="field"><label>Failed breaks</label><input type="number" id="sh-failedBreaks" value="${Math.floor(cs.failedBreaks ?? 0)}" min="0"></div>
        <div class="field"><label>Shell Capacity (état)</label><input type="number" id="sh-capacity" value="${Math.floor(S.coreShellCapacity ?? 0)}" min="0"></div>
        <div class="field"><label>Shell Hardness (état)</label><input type="number" id="sh-hardness" value="${Math.floor(S.coreShellHardness ?? 0)}" min="0"></div>
        <div class="field"><label>Shell Reflect (état)</label><input type="number" id="sh-reflect" value="${(S.coreShellReflect ?? 0).toFixed(4)}" step="0.01" min="0"></div>
      </div>
      <div style="margin-top:12px">
        <button class="btn btn-primary" id="btn-sh-apply">✓ Appliquer Shell</button>
        <button class="btn btn-ghost" style="margin-left:8px" id="btn-sh-reset">✕ Reset Shell</button>
      </div>
    </div>
  `);

  document.getElementById('btn-sh-apply').addEventListener('click', () => {
    S.coreShell.storedFragments = Math.max(0, Math.floor(Number(document.getElementById('sh-stored').value) || 0));
    S.coreShell.cracks          = Math.max(0, Math.floor(Number(document.getElementById('sh-cracks').value) || 0));
    S.coreShell.failedBreaks    = Math.max(0, Math.floor(Number(document.getElementById('sh-failedBreaks').value) || 0));
    S.coreShellCapacity         = Math.max(0, Math.floor(Number(document.getElementById('sh-capacity').value) || 0));
    S.coreShellHardness         = Math.max(0, Math.floor(Number(document.getElementById('sh-hardness').value) || 0));
    S.coreShellReflect          = Math.max(0, Number(document.getElementById('sh-reflect').value) || 0);
    toast('Core Shell mis à jour ✓');
    render();
  });
  document.getElementById('btn-sh-reset').addEventListener('click', () => {
    S.coreShell = { storedFragments: 0, cracks: 0, lastBreakAt: 0, failedBreaks: 0 };
    toast('Core Shell réinitialisé');
    render();
  });
}

// ── Tab: JSON ────────────────────────────────────────────────
function renderJson(root) {
  root.insertAdjacentHTML('beforeend', `
    <div class="section-head">JSON BRUT</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn btn-primary" id="btn-json-import">⬆ Importer ce JSON</button>
      <button class="btn btn-ghost"   id="btn-json-copy">⎘ Copier</button>
      <button class="btn btn-ghost"   id="btn-json-format">{ } Formater</button>
    </div>
    <textarea class="json-box" id="json-box" spellcheck="false">${JSON.stringify(sanitizeForExport(S), null, 2)}</textarea>
  `);

  document.getElementById('btn-json-format').addEventListener('click', () => {
    const ta = document.getElementById('json-box');
    try { ta.value = JSON.stringify(JSON.parse(ta.value), null, 2); }
    catch { toast('JSON invalide', true); }
  });
  document.getElementById('btn-json-copy').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('json-box').value)
      .then(() => toast('Copié ✓'))
      .catch(() => toast('Échec copie', true));
  });
  document.getElementById('btn-json-import').addEventListener('click', () => {
    try {
      const raw = JSON.parse(document.getElementById('json-box').value);
      S = hydrateState(raw, raw?.userId ?? 'guest');
      render();
      toast('JSON importé ✓');
    } catch { toast('JSON invalide', true); }
  });
}

// ── Tab: Import/Export ───────────────────────────────────────
function renderImport(root) {
  root.insertAdjacentHTML('beforeend', `
    <div class="section-head">IMPORT / EXPORT</div>
    <div class="card" style="display:flex;flex-direction:column;gap:12px">
      <div>
        <div class="section-head" style="font-size:11px;margin-bottom:8px">EXPORTER</div>
        <button class="btn btn-primary" id="btn-export">📤 Télécharger JSON</button>
      </div>
      <hr style="border:none;border-top:1px solid var(--border)">
      <div>
        <div class="section-head" style="font-size:11px;margin-bottom:8px">IMPORTER UN FICHIER</div>
        <input type="file" id="file-import" accept=".json,application/json" style="display:none">
        <button class="btn btn-ghost" id="btn-file-pick">📂 Choisir fichier JSON</button>
        <span id="file-name" style="margin-left:10px;font-size:10px;color:var(--muted)"></span>
      </div>
      <hr style="border:none;border-top:1px solid var(--border)">
      <div>
        <div class="section-head" style="font-size:11px;margin-bottom:8px">COLLER UN JSON</div>
        <textarea class="json-box" id="paste-box" placeholder="Colle ici une save JSON..." style="min-height:140px"></textarea>
        <button class="btn btn-primary" style="margin-top:8px" id="btn-paste-import">⬆ Importer depuis le texte</button>
      </div>
    </div>
  `);

  document.getElementById('btn-export').addEventListener('click', () => {
    const payload = { app:'nitro-clicker', exportVersion:1, exportedAt:new Date().toISOString(), save: sanitizeForExport(S) };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `nitro-debug-save-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  document.getElementById('btn-file-pick').addEventListener('click', () =>
    document.getElementById('file-import').click()
  );
  document.getElementById('file-import').addEventListener('change', async e => {
    const file = e.target.files?.[0];
    if (!file) return;
    document.getElementById('file-name').textContent = file.name;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      const raw = parsed?.save ?? parsed;
      S = hydrateState(raw, raw?.userId ?? 'guest');
      render();
      toast('Fichier importé ✓');
    } catch { toast('Fichier invalide', true); }
  });

  document.getElementById('btn-paste-import').addEventListener('click', () => {
    const text = document.getElementById('paste-box').value.trim();
    if (!text) return toast('Rien à importer', true);
    try {
      const parsed = JSON.parse(text);
      const raw = parsed?.save ?? parsed;
      S = hydrateState(raw, raw?.userId ?? 'guest');
      render();
      toast('JSON importé ✓');
    } catch { toast('JSON invalide', true); }
  });
}

// ── Tab: Actions rapides ─────────────────────────────────────
function renderActions(root) {
  const req = prestigeRequirement(S);
  root.insertAdjacentHTML('beforeend', `
    <div class="section-head">ACTIONS RAPIDES</div>
    <div class="card" style="display:flex;flex-direction:column;gap:10px">

      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn btn-primary" id="act-fill-energy">
          ⚡ Remplir énergie (req prestige)
        </button>
        <button class="btn btn-primary" id="act-add-frag10">
          +10 fragments
        </button>
        <button class="btn btn-primary" id="act-add-frag100">
          +100 fragments
        </button>
      </div>

      <hr style="border:none;border-top:1px solid var(--border)">

      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn btn-gold" id="act-prestige1">
          ✦ Forcer Prestige +1
        </button>
        <button class="btn btn-gold" id="act-prestige5">
          ✦ Forcer Prestige +5
        </button>
        <button class="btn btn-gold" id="act-prestige10">
          ✦ Forcer Prestige +10
        </button>
      </div>

      <hr style="border:none;border-top:1px solid var(--border)">

      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn btn-ghost" id="act-unlock-all">
          🔓 Débloquer tous les upgrades (Lv.1)
        </button>
        <button class="btn btn-ghost" id="act-ms-all">
          🏆 Valider tous les milestones
        </button>
        <button class="btn btn-ghost" id="act-recalc">
          ↺ Recalc stats dérivées
        </button>
      </div>

      <hr style="border:none;border-top:1px solid var(--border)">

      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn btn-danger" id="act-reset-run">
          ⚠ Reset run (garder prestige &amp; fragments)
        </button>
        <button class="btn btn-danger" id="act-wipe">
          💀 WIPE COMPLET (nouvelle partie)
        </button>
      </div>
    </div>
  `);

  document.getElementById('act-fill-energy').addEventListener('click', () => {
    const r = prestigeRequirement(S);
    S.energy = Math.max(S.energy, r * 1.1);
    S.totalEnergy = Math.max(S.totalEnergy, S.energy);
    recalcDerivedStats(S);
    render();
    toast(`Énergie : ${fmt(S.energy)} ✓`);
  });

  document.getElementById('act-add-frag10').addEventListener('click', () => {
    S.fragments += 10; S.totalFragments += 10; render(); toast('+10 fragments ✓');
  });
  document.getElementById('act-add-frag100').addEventListener('click', () => {
    S.fragments += 100; S.totalFragments += 100; render(); toast('+100 fragments ✓');
  });

  const addPrestige = n => () => {
    S.prestige += n;
    recalcDerivedStats(S);
    render();
    toast(`Prestige → ${S.prestige} ✓`);
  };
  document.getElementById('act-prestige1').addEventListener('click',  addPrestige(1));
  document.getElementById('act-prestige5').addEventListener('click',  addPrestige(5));
  document.getElementById('act-prestige10').addEventListener('click', addPrestige(10));

  document.getElementById('act-unlock-all').addEventListener('click', () => {
    UPGRADES.forEach(u => { if (!S.upgrades[u.id]) S.upgrades[u.id] = 1; });
    recalcDerivedStats(S);
    render();
    toast('Upgrades débloqués ✓');
  });
  document.getElementById('act-ms-all').addEventListener('click', () => {
    MILESTONES.forEach(m => { S.milestones[m.id] = S.milestones[m.id] || Date.now(); });
    render();
    toast('Milestones validés ✓');
  });
  document.getElementById('act-recalc').addEventListener('click', () => {
    recalcDerivedStats(S);
    render();
    toast('Recalc ok ✓');
  });

  document.getElementById('act-reset-run').addEventListener('click', () => {
    const frag = S.fragments, totalFrag = S.totalFragments;
    const prestige = S.prestige, milestones = S.milestones;
    const totalClicks = S.totalClicks, lifetimeEnergy = S.lifetimeEnergy;
    const persistentUpgrades = {};
    UPGRADES.filter(u => u.currency === 'fragments' || u.persistent)
      .forEach(u => { persistentUpgrades[u.id] = S.upgrades[u.id] ?? 0; });
    S = createDefaultState(S.userId);
    S.fragments = frag; S.totalFragments = totalFrag;
    S.prestige = prestige; S.milestones = milestones;
    S.totalClicks = totalClicks; S.lifetimeEnergy = lifetimeEnergy;
    S.upgrades = { ...S.upgrades, ...persistentUpgrades };
    recalcDerivedStats(S);
    render();
    toast('Run réinitialisé ✓');
  });
  document.getElementById('act-wipe').addEventListener('click', () => {
    if (!confirm('Wipe COMPLET — toutes les données seront effacées. Continuer ?')) return;
    S = createDefaultState('guest');
    recalcDerivedStats(S);
    render();
    toast('Wipe complet ✓');
  });
}

// ── Sanitize ─────────────────────────────────────────────────
function sanitizeForExport(state) {
  const clean = { ...state };
  delete clean.__key;
  clean.version   = VERSION;
  clean.updatedAt = Date.now();
  return clean;
}

// ── Global apply & reload ────────────────────────────────────
document.getElementById('btn-save-apply').addEventListener('click', () => {
  writeSave(S);
  toast('Save écrite ✓');
});
document.getElementById('btn-reload').addEventListener('click', () => {
  S = loadSave();
  render();
  toast('Save rechargée ✓');
});

// ── Nav ──────────────────────────────────────────────────────
document.querySelectorAll('.nav-btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ── Boot ─────────────────────────────────────────────────────
render();
</script>
</body>
